<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 × 세발자전거</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.app",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allRecords = {};
        let productOrder = [];
        let mainChart = null;
        let editingId = null;

        const colorPalette = [
            { main: '#FFD93D', bg: 'rgba(255, 217, 61, 0.08)' },
            { main: '#FF8B13', bg: 'rgba(255, 139, 19, 0.08)' },
            { main: '#FF6B6B', bg: 'rgba(255, 107, 107, 0.08)' },
            { main: '#4D96FF', bg: 'rgba(77, 150, 255, 0.08)' },
            { main: '#6BCB77', bg: 'rgba(107, 203, 119, 0.08)' },
            { main: '#9D72FF', bg: 'rgba(157, 114, 255, 0.08)' }
        ];
        const productTheme = {};

        function init() {
            const now = new Date();
            document.getElementById('headerDate').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
            const monthFilter = document.getElementById('monthFilter');
            monthFilter.value = now.toISOString().substring(0, 7);
            monthFilter.addEventListener('change', processData);

            onValue(ref(db, 'records'), (snapshot) => {
                allRecords = snapshot.val() || {};
                processData();
            });
            onValue(ref(db, 'settings/order'), (snapshot) => {
                productOrder = snapshot.val() || ["고양이 인형", "고양이 키링", "북커버", "양면 파우치", "꽃수세미", "크로스백"];
                productOrder.forEach((name, i) => { 
                    productTheme[name] = colorPalette[i % colorPalette.length]; 
                });
                processData();
            });
        }

        function formatDate(dateStr) {
            if(!dateStr) return "";
            const parts = dateStr.split('-');
            return `${parts[0].substring(2)}년 ${parseInt(parts[1])}월 ${parseInt(parts[2])}일`;
        }

        function processData() {
            const summary = {}; 
            let mSettle = 0; let mSales = 0; 
            let tSettle = 0; let tSales = 0;
            const historyMap = {}; // 월별 히스토리용
            const filterMonth = document.getElementById('monthFilter').value;
            const monthlyChartData = {};

            document.getElementById('monthlyTitle').innerText = `${filterMonth.substring(2,4)}년 ${parseInt(filterMonth.substring(5))}월`;

            Object.entries(allRecords).forEach(([id, rec]) => {
                const recMonth = rec.date?.substring(0, 7);
                let prod = rec.product || "미분류";

                if (prod === "결제") {
                    const amt = Number(rec.settleAmount || 0);
                    tSettle += amt;
                    if (recMonth === filterMonth) mSettle += amt;
                    
                    // 히스토리 집계 (현재 선택월 제외)
                    if (recMonth !== filterMonth) {
                        historyMap[recMonth] = (historyMap[recMonth] || 0) + amt;
                    }
                    return;
                }

                if (!summary[prod]) summary[prod] = { supply: 0, sales: 0, allDetails: [] };
                summary[prod].supply += Number(rec.supplyCount || 0);
                summary[prod].sales += Number(rec.salesCount || 0);
                summary[prod].allDetails.push({ ...rec, id: id });
                tSales += Number(rec.salesCount || 0);

                if (recMonth === filterMonth) {
                    mSales += Number(rec.salesCount || 0);
                    if (Number(rec.salesCount) > 0) monthlyChartData[prod] = (monthlyChartData[prod] || 0) + Number(rec.salesCount);
                }
            });

            document.getElementById('mAmount').innerText = mSettle.toLocaleString() + '원';
            document.getElementById('mCount').innerText = mSales + '개';
            document.getElementById('tAmount').innerText = tSettle.toLocaleString() + '원';
            document.getElementById('tCount').innerText = tSales + '개';
            
            renderCards(summary);
            renderHistory(filterMonth);
            renderMonthlySettleHistory(historyMap);
            updateChart(monthlyChartData);
        }

        // 월간 정산 히스토리 렌더링
        function renderMonthlySettleHistory(historyMap) {
            const container = document.getElementById('monthlySettleList');
            container.innerHTML = '';
            
            const sortedMonths = Object.keys(historyMap).sort().reverse();
            
            if (sortedMonths.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-slate-400 text-xs font-bold">이전 정산 기록이 없습니다.</div>`;
                return;
            }

            sortedMonths.forEach(m => {
                const row = document.createElement('div');
                row.className = "flex justify-between items-center py-4 border-b border-black/5 last:border-0 px-6";
                row.innerHTML = `
                    <span class="text-[13px] text-slate-500 font-bold">${m.substring(2,4)}년 ${parseInt(m.substring(5))}월</span>
                    <span class="text-[15px] font-black text-slate-800">${historyMap[m].toLocaleString()}원</span>
                `;
                container.appendChild(row);
            });
        }

        window.toggleDashboardHistory = () => {
            const el = document.getElementById('dashboardHistory');
            el.classList.toggle('hidden');
        };

        function renderCards(summary) {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            
            productOrder.forEach(name => {
                const data = summary[name] || { supply: 0, sales: 0, allDetails: [] };
                const theme = productTheme[name] || { main: '#ccc', bg: 'rgba(200,200,200,0.1)' };
                
                const card = document.createElement('div');
                card.className = "mb-4";
                
                const detailContent = data.allDetails.length > 0 
                    ? data.allDetails.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(d => 
                        `<div onclick="startEdit('${d.id}', ${JSON.stringify(d).replace(/"/g, '&quot;')})" 
                              class="grid grid-cols-12 items-center py-4 border-b border-black/5 last:border-0 px-4 active:bg-black/5 transition-colors cursor-pointer">
                            <span class="col-span-4 text-[11px] text-slate-400 font-bold">${formatDate(d.date)}</span>
                            <div class="col-span-8 flex justify-end gap-4 text-[13px] font-black">
                                <span class="text-blue-500">납품 ${d.supplyCount}</span>
                                <span class="text-red-500">판매 ${d.salesCount}</span>
                            </div>
                         </div>`).join('')
                    : `<div class="text-center py-6 text-slate-400 text-xs font-bold">기록이 없습니다.</div>`;

                card.innerHTML = `
                    <div onclick="toggleDetail('${name.replace(/\s+/g, '')}')" style="background-color: ${theme.bg}" 
                         class="relative overflow-hidden backdrop-blur-sm rounded-[1.6rem] p-5 shadow-sm border border-white/40 flex justify-between items-center cursor-pointer active:scale-[0.98] transition-all">
                        <div class="absolute left-0 top-1/4 bottom-1/4 w-[3.5px] rounded-r-full" style="background-color: ${theme.main}"></div>
                        <div class="w-[28%] pl-2">
                            <span class="font-black text-slate-800 text-[14px] tracking-tighter truncate block">${name}</span>
                        </div>
                        <div class="flex-1 flex justify-center items-center gap-6 px-2">
                            <div class="text-center"><p class="text-[9px] text-slate-400 font-bold mb-0.5">납품</p><p class="text-blue-500 text-[19px] font-black leading-none">${data.supply}</p></div>
                            <div class="text-center"><p class="text-[9px] text-slate-400 font-bold mb-0.5">판매</p><p class="text-red-500 text-[19px] font-black leading-none">${data.sales}</p></div>
                            <div class="text-center"><p class="text-[9px] text-slate-400 font-bold mb-0.5">재고</p><p class="text-slate-900 text-[19px] font-black leading-none">${data.supply - data.sales}</p></div>
                        </div>
                        <div class="w-[10%] flex justify-end"><div class="handle text-slate-300 text-2xl" onclick="event.stopPropagation()">≡</div></div>
                    </div>
                    <div id="detail-${name.replace(/\s+/g, '')}" class="hidden mt-2 bg-white/70 rounded-[1.5rem] overflow-hidden border border-white/60 shadow-inner mx-2">
                        ${detailContent}
                    </div>
                `;
                container.appendChild(card);
            });
            new Sortable(container, { handle: '.handle', animation: 200 });
        }

        window.toggleDetail = (id) => { document.getElementById(`detail-${id}`).classList.toggle('hidden'); };

        window.startEdit = (id, rec) => {
            editingId = id; closeInputs();
            const target = rec.product === "결제" ? 'settleInput' : 'basicInput';
            document.getElementById(target).classList.remove('hidden');
            if (rec.product === "결제") {
                document.getElementById('sDate').value = rec.date;
                document.getElementById('sQty').value = rec.salesCount;
                document.getElementById('sTotal').value = rec.settleAmount;
            } else {
                document.getElementById('bDate').value = rec.date;
                document.getElementById('bProd').value = rec.product;
                document.getElementById('bSupply').value = rec.supplyCount;
                document.getElementById('bSales').value = rec.salesCount;
            }
        };

        function renderHistory(filterMonth) {
            const histBody = document.getElementById('historyList');
            histBody.innerHTML = '';
            Object.entries(allRecords)
                .filter(([_, rec]) => rec.date?.startsWith(filterMonth))
                .sort((a, b) => new Date(b[1].date) - new Date(a[1].date))
                .forEach(([id, rec]) => {
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center p-4 bg-white/60 rounded-2xl mb-2 text-[13px] cursor-pointer border border-white/40 active:scale-[0.98]";
                    div.onclick = () => startEdit(id, rec);
                    div.innerHTML = `<div class="flex flex-col"><span class="text-[10px] text-slate-400 font-bold">${formatDate(rec.date)}</span><span class="font-black">${rec.product}</span></div><button onclick="event.stopPropagation(); deleteRecord('${id}')" class="p-2 text-slate-300">🗑️</button>`;
                    histBody.appendChild(div);
                });
        }

        window.openInput = (type) => { editingId = null; closeInputs(); document.getElementById(type === 'basic' ? 'basicInput' : 'settleInput').classList.remove('hidden'); };
        window.closeInputs = () => { document.getElementById('basicInput').classList.add('hidden'); document.getElementById('settleInput').classList.add('hidden'); };
        window.saveData = (type) => {
            let data = { timestamp: serverTimestamp() };
            const prefix = type === 'basic' ? 'b' : 's';
            data.date = document.getElementById(`${prefix}Date`).value;
            if (type === 'basic') {
                data.product = document.getElementById('bProd').value;
                data.supplyCount = Number(document.getElementById('bSupply').value) || 0;
                data.salesCount = Number(document.getElementById('bSales').value) || 0;
            } else {
                data.product = "결제";
                data.settleAmount = Number(document.getElementById('sTotal').value) || 0;
                data.salesCount = Number(document.getElementById('sQty').value) || 0;
            }
            const action = editingId ? update(ref(db, `records/${editingId}`), data) : push(ref(db, 'records'), data);
            action.then(() => closeInputs());
        };
        window.deleteRecord = (id) => { if (confirm("삭제할까요?")) remove(ref(db, `records/${id}`)); };

        function updateChart(chartData) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            if (mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(chartData), datasets: [{ data: Object.values(chartData), backgroundColor: Object.keys(chartData).map(l => productTheme[l]?.main || '#eee'), borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '82%', responsive: true, maintainAspectRatio: false }
            });
        }
        window.onload = init;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 p-4 pb-48 overflow-x-hidden">
    <div class="max-w-md mx-auto space-y-6">
        <header class="py-2 px-1 space-y-4">
            <h1 class="text-[26px] font-black tracking-tighter text-center">웃는 고양이 <span class="text-orange-500">×</span> 세발자전거</h1>
            <div class="flex justify-between items-center">
                <p id="headerDate" class="text-[12.5px] font-black text-slate-600 tracking-wider h-[42px] flex items-center"></p>
                <input type="month" id="monthFilter" class="bg-white border-none rounded-xl px-4 h-[42px] text-[12.5px] font-black shadow-md outline-none">
            </div>
        </header>

        <!-- 대시보드 (클릭 시 히스토리 토글) -->
        <div class="space-y-2">
            <section onclick="toggleDashboardHistory()" class="bg-gradient-to-br from-orange-400 to-amber-500 rounded-[2.5rem] p-8 shadow-xl text-white relative overflow-hidden flex flex-col justify-between h-60 cursor-pointer active:scale-[0.99] transition-all">
                <div class="relative z-10">
                    <p id="monthlyTitle" class="text-[11.5px] font-black opacity-80 uppercase tracking-widest mb-1"></p>
                    <p id="mAmount" class="text-4xl font-black tracking-tight">0원</p>
                    <p class="text-[11px] font-black text-black opacity-70 uppercase tracking-widest mt-6 mb-0.5">총 판매액</p>
                    <p id="tAmount" class="text-[28px] font-black text-black leading-tight">0원</p>
                </div>
                <div class="absolute -right-4 top-1/2 -translate-y-1/2 w-44 h-44 opacity-40 z-0"><canvas id="salesChart"></canvas></div>
                <div class="relative z-10 flex gap-6 text-[13px] font-bold text-slate-800 border-t border-white/20 pt-4">
                    <p>월 판매 <span id="mCount" class="font-black text-slate-800">0개</span></p>
                    <p>총 판매 <span id="tCount" class="font-black text-slate-800">0개</span></p>
                </div>
            </section>
            
            <!-- 월간 정산 히스토리 슬라이드 창 -->
            <div id="dashboardHistory" class="hidden bg-white/80 rounded-[2rem] overflow-hidden border border-white/60 shadow-inner mx-2 transition-all">
                <div class="bg-slate-100/50 py-3 px-6 text-[10px] font-black text-slate-400 tracking-widest border-b border-black/5">MONTHLY HISTORY</div>
                <div id="monthlySettleList"></div>
            </div>
        </div>

        <div id="cardContainer" class="space-y-1"></div>

        <section class="bg-slate-200/30 p-6 rounded-[2.5rem] border border-white/60">
            <h3 class="font-black text-[10px] mb-6 text-slate-400 tracking-[0.3em] uppercase text-center">전체 활동 타임라인</h3>
            <div id="historyList"></div>
        </section>

        <div class="fixed bottom-8 left-6 right-6 max-w-md mx-auto grid grid-cols-2 gap-4 z-[100]">
            <button onclick="openInput('basic')" class="bg-slate-900 text-white py-5 rounded-[2.2rem] font-black shadow-2xl active:scale-95 transition-all">📦 수량 기록</button>
            <button onclick="openInput('settle')" class="bg-orange-500 text-white py-5 rounded-[2.2rem] font-black shadow-2xl active:scale-95 transition-all">💰 정산 기록</button>
        </div>

        <!-- 입력 패널 생략 (위와 동일) -->
        <section id="basicInput" class="hidden fixed inset-x-4 bottom-24 bg-white p-8 rounded-[3rem] shadow-2xl z-[101] border border-slate-100">
            <div class="flex justify-between items-center mb-4"><h2 class="font-black text-lg">수량 기록</h2><button onclick="closeInputs()" class="text-slate-300 text-2xl">✕</button></div>
            <input type="date" id="bDate" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 font-bold outline-none">
            <select id="bProd" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 font-bold outline-none">
                <option value="고양이 인형">고양이 인형</option><option value="고양이 키링">고양이 키링</option><option value="북커버">북커버</option><option value="양면 파우치">양면 파우치</option><option value="꽃수세미">꽃수세미</option><option value="크로스백">크로스백</option>
            </select>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="number" id="bSupply" placeholder="납품" class="p-5 bg-blue-50 rounded-2xl font-black text-center text-xl outline-none">
                <input type="number" id="bSales" placeholder="판매" class="p-5 bg-red-50 rounded-2xl font-black text-center text-xl outline-none">
            </div>
            <button onclick="saveData('basic')" class="w-full bg-slate-900 text-white p-5 rounded-[1.8rem] font-black text-lg">데이터 저장</button>
        </section>

        <section id="settleInput" class="hidden fixed inset-x-4 bottom-24 bg-white p-8 rounded-[3rem] shadow-2xl z-[101] border border-slate-100">
            <div class="flex justify-between items-center mb-4"><h2 class="font-black text-lg text-orange-600">정산 기록</h2><button onclick="closeInputs()" class="text-slate-300 text-2xl">✕</button></div>
            <input type="date" id="sDate" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 font-bold outline-none">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="number" id="sQty" placeholder="판매수" class="p-5 bg-slate-50 rounded-2xl font-bold text-center outline-none">
                <input type="number" id="sTotal" placeholder="정산금" class="p-5 bg-orange-50 rounded-2xl font-black text-orange-600 text-center outline-none">
            </div>
            <button onclick="saveData('settle')" class="w-full bg-orange-500 text-white p-5 rounded-[1.8rem] font-black text-lg">정산 완료</button>
        </section>
    </div>
</body>
</html>

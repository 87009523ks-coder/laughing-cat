<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 p-4">

    <header class="text-center mb-8">
        <h1 class="text-2xl font-bold text-orange-500">🐱 웃는 고양이 x 세발자전거</h1>
        <p class="text-sm text-gray-500">실시간 납품 및 재고 관리</p>
    </header>

    <!-- 1. 입고 입력 섹션 -->
    <section class="bg-white p-6 rounded-2xl shadow-sm mb-6">
        <h2 class="text-lg font-semibold mb-4 text-gray-700">🚚 신규 납품 등록</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">제품 선택</label>
                <select id="productSelect" class="w-full p-3 border rounded-xl bg-gray-50">
                    <option value="고양이 인형 대">고양이 인형 대 (16,000원)</option>
                    <option value="고양이 인형 걸이">고양이 인형 걸이 (16,000원)</option>
                    <option value="고양이 키링">고양이 키링 (14,400원)</option>
                    <option value="북커버">북커버 (20,000원)</option>
                    <option value="양면 파우치">양면 파우치 (12,000원)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">수량</label>
                <input type="number" id="quantityInput" placeholder="0" class="w-full p-3 border rounded-xl bg-gray-50">
            </div>
            <button onclick="addStock()" class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl hover:bg-orange-600 transition">
                납품 기록하기
            </button>
        </div>
    </section>

    <!-- 2. 현재 재고 현황 -->
    <section class="bg-white p-6 rounded-2xl shadow-sm">
        <h2 class="text-lg font-semibold mb-4 text-gray-700">📊 현재고 및 정산 현황</h2>
        <div id="stockList" class="space-y-3">
            <!-- 데이터가 여기에 표시됩니다 -->
        </div>
    </section>

    <script>
        // 초기 데이터 (엑셀의 마지막 재고 파악 기준)
        let inventory = JSON.parse(localStorage.getItem('catInventory')) || {
            "고양이 인형 대": 5,
            "고양이 인형 걸이": 0,
            "고양이 키링": 7,
            "북커버": 6,
            "양면 파우치": 4
        };

        const prices = {
            "고양이 인형 대": 16000,
            "고양이 인형 걸이": 16000,
            "고양이 키링": 14400,
            "북커버": 20000,
            "양면 파우치": 12000
        };

        function render() {
            const list = document.getElementById('stockList');
            list.innerHTML = '';
            
            for (const [name, count] of Object.entries(inventory)) {
                const itemDiv = document.createElement('div');
                itemDiv.className = "flex justify-between items-center p-3 bg-gray-50 rounded-lg";
                itemDiv.innerHTML = `
                    <div>
                        <span class="font-medium">${name}</span>
                        <p class="text-xs text-gray-400">공급가: ${prices[name].toLocaleString()}원</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-lg font-bold text-blue-600">${count}개</span>
                        <button onclick="sellItem('${name}')" class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded">정산</button>
                    </div>
                `;
                list.appendChild(itemDiv);
            }
            localStorage.setItem('catInventory', JSON.stringify(inventory));
        }

        function addStock() {
            const name = document.getElementById('productSelect').value;
            const qty = parseInt(document.getElementById('quantityInput').value);
            if (isNaN(qty) || qty <= 0) return alert("수량을 입력하세요.");
            
            inventory[name] += qty;
            document.getElementById('quantityInput').value = '';
            render();
        }

        function sellItem(name) {
            if (inventory[name] <= 0) return alert("재고가 없습니다.");
            if (confirm(`${name} 1개를 정산 처리하시겠습니까? (재고 1 차감)`)) {
                inventory[name] -= 1;
                render();
            }
        }

        render();
    </script>
</body>
</html>

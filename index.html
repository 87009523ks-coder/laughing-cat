<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 관리자 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.com",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            measurementId: "G-TRXM2NZ5FF",
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allRecords = {}; // 전체 기록 저장용

        function init() {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('headerDate').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일(${days[now.getDay()]})`;
            document.querySelectorAll('input[type="date"]').forEach(el => el.valueAsDate = now);
        }

        // 실시간 데이터 감시
        onValue(ref(db, 'records'), (snapshot) => {
            allRecords = snapshot.val() || {};
            const summary = {};
            Object.values(allRecords).forEach(rec => {
                if (!summary[rec.product]) summary[rec.product] = { supply: 0, sales: 0 };
                summary[rec.product].supply += Number(rec.supplyCount || 0);
                summary[rec.product].sales += Number(rec.salesCount || 0);
            });
            renderTable(summary);
        });

        function renderTable(summary) {
            const body = document.getElementById('inventoryBody');
            body.innerHTML = '';
            const defaults = ["인형", "인형 걸이", "키링", "북커버", "파우치"];
            const products = Array.from(new Set([...defaults, ...Object.keys(summary)]));

            products.forEach(name => {
                const { supply, sales } = summary[name] || { supply: 0, sales: 0 };
                const stock = supply - sales;
                const tr = document.createElement('tr');
                tr.className = "border-b text-sm cursor-pointer hover:bg-orange-50 active:bg-orange-100 transition-colors";
                tr.onclick = () => showDetails(name); // 행 클릭 시 상세 수정창 오픈
                tr.innerHTML = `
                    <td class="p-4 font-medium">${name}</td>
                    <td class="p-4 text-center text-blue-500">${supply}</td>
                    <td class="p-4 text-center text-red-500">${sales}</td>
                    <td class="p-4 text-center font-black text-gray-800">${stock}</td>
                `;
                body.appendChild(tr);
            });
        }

        // 특정 제품의 상세 기록 보기
        window.showDetails = (productName) => {
            const detailSection = document.getElementById('detailSection');
            const detailTitle = document.getElementById('detailTitle');
            const detailList = document.getElementById('detailList');
            
            detailSection.classList.remove('hidden');
            detailTitle.innerText = `[${productName}] 상세 기록 수정`;
            detailList.innerHTML = '';

            // 해당 제품의 기록만 필터링 (최신순)
            const filtered = Object.entries(allRecords)
                .filter(([id, rec]) => rec.product === productName)
                .sort((a, b) => new Date(b[1].date) - new Date(a[1].date));

            if (filtered.length === 0) {
                detailList.innerHTML = '<p class="text-center py-10 text-gray-400">기록이 없습니다.</p>';
                return;
            }

            filtered.forEach(([id, rec]) => {
                const div = document.createElement('div');
                div.className = "bg-gray-50 p-4 rounded-2xl space-y-2 border border-gray-100 mb-3";
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="text-xs font-bold text-gray-400">${rec.date}</span>
                        <button onclick="deleteRecord('${id}')" class="text-[10px] text-red-400 border border-red-100 px-2 py-1 rounded-md">삭제</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <div>
                            <label class="text-[10px] text-gray-400">납품</label>
                            <input type="number" value="${rec.supplyCount || 0}" onchange="updateValue('${id}', 'supplyCount', this.value)" class="w-full p-2 bg-white rounded-lg border-none text-sm text-blue-600 font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400">판매</label>
                            <input type="number" value="${rec.salesCount || 0}" onchange="updateValue('${id}', 'salesCount', this.value)" class="w-full p-2 bg-white rounded-lg border-none text-sm text-red-600 font-bold">
                        </div>
                    </div>
                    ${rec.price ? `
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[10px] text-gray-400">단가</label>
                            <input type="number" value="${rec.price}" onchange="updateValue('${id}', 'price', this.value)" class="w-full p-2 bg-white rounded-lg border-none text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400">정산금액</label>
                            <input type="number" value="${rec.settleAmount}" onchange="updateValue('${id}', 'settleAmount', this.value)" class="w-full p-2 bg-white rounded-lg border-none text-sm text-green-600 font-bold">
                        </div>
                    </div>` : ''}
                `;
                detailList.appendChild(div);
            });
            // 클릭 시 화면 하단으로 스크롤
            detailSection.scrollIntoView({ behavior: 'smooth' });
        };

        // 데이터 수정
        window.updateValue = (id, field, value) => {
            update(ref(db, `records/${id}`), { [field]: Number(value) });
        };

        // 데이터 삭제
        window.deleteRecord = (id) => {
            if (confirm("정말 이 기록을 삭제하시겠습니까?")) {
                remove(ref(db, `records/${id}`));
                alert("삭제되었습니다.");
            }
        };

        // 정산 자동 계산
        window.calcSettle = (base) => {
            const price = Number(document.getElementById('sPrice').value) || 0;
            const rate = Number(document.getElementById('sRate').value) || 0;
            const total = Number(document.getElementById('sTotal').value) || 0;
            if (base === 'rate' && price) document.getElementById('sTotal').value = Math.round(price * (rate / 100));
            else if (base === 'total' && price) document.getElementById('sRate').value = ((total / price) * 100).toFixed(1);
        };

        // 저장 함수
        window.saveData = (type) => {
            let product, supply = 0, sales = 0, price = 0, settle = 0, date;
            if (type === 'basic') {
                date = document.getElementById('bDate').value;
                product = document.getElementById('bProd').value === '기타' ? document.getElementById('bEtc').value : document.getElementById('bProd').value;
                supply = Number(document.getElementById('bSupply').value) || 0;
                sales = Number(document.getElementById('bSales').value) || 0;
            } else {
                date = document.getElementById('sDate').value;
                product = document.getElementById('sProd').value === '기타' ? document.getElementById('sEtc').value : document.getElementById('sProd').value;
                price = Number(document.getElementById('sPrice').value) || 0;
                settle = Number(document.getElementById('sTotal').value) || 0;
                sales = Number(document.getElementById('sQty').value) || 0;
            }
            if (!product) return alert("제품명을 확인하세요.");
            push(ref(db, 'records'), {
                date, product, supplyCount: supply, salesCount: sales, price, settleAmount: settle, timestamp: serverTimestamp()
            }).then(() => {
                alert("저장되었습니다.");
                document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
            });
        };

        window.toggleEtc = (selectId, etcId) => {
            const val = document.getElementById(selectId).value;
            document.getElementById(etcId).classList.toggle('hidden', val !== '기타');
        };

        window.onload = init;
    </script>
</head>
<body class="bg-gray-100 p-4 pb-20">
    <div class="max-w-md mx-auto space-y-4">
        <!-- 헤더 -->
        <header class="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm">
            <h1 class="text-xl font-black text-orange-500 tracking-tighter">웃는 고양이 Admin</h1>
            <span id="headerDate" class="text-xs font-bold text-gray-400 bg-gray-50 px-3 py-1 rounded-full"></span>
        </header>

        <!-- 재고 현황판 (클릭 가능) -->
        <section class="bg-white rounded-3xl shadow-sm overflow-hidden border border-white">
            <div class="bg-orange-50 p-3 text-[10px] font-bold text-orange-400 text-center uppercase tracking-widest">행을 클릭하면 상세 기록 수정이 가능합니다</div>
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-[10px] text-gray-400 uppercase tracking-widest">
                    <tr>
                        <th class="p-4">제품명</th>
                        <th class="p-4 text-center">납품</th>
                        <th class="p-4 text-center">판매</th>
                        <th class="p-4 text-center text-orange-500">재고</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </section>

        <!-- 상세 수정 섹션 (평소엔 숨김) -->
        <section id="detailSection" class="hidden bg-white p-6 rounded-3xl shadow-2xl border-2 border-orange-400 space-y-4 animate-bounce-short">
            <div class="flex justify-between items-center">
                <h3 id="detailTitle" class="font-black text-gray-800"></h3>
                <button onclick="document.getElementById('detailSection').classList.add('hidden')" class="text-gray-400 text-xl">&times;</button>
            </div>
            <div id="detailList" class="max-h-80 overflow-y-auto space-y-3 pr-1">
                <!-- 상세 기록 카드들이 들어감 -->
            </div>
        </section>

        <!-- 입력 버튼 -->
        <div class="grid grid-cols-2 gap-3">
            <button onclick="document.getElementById('basicInput').classList.toggle('hidden'); document.getElementById('settleInput').classList.add('hidden')" class="bg-gray-800 text-white p-4 rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition-transform">📦 수량 기록</button>
            <button onclick="document.getElementById('settleInput').classList.toggle('hidden'); document.getElementById('basicInput').classList.add('hidden')" class="bg-orange-500 text-white p-4 rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition-transform">💰 정산 기록</button>
        </div>

        <!-- 수량 입력 폼 -->
        <section id="basicInput" class="hidden bg-white p-6 rounded-3xl shadow-xl space-y-3 border-2 border-gray-800">
            <input type="date" id="bDate" class="w-full p-4 bg-gray-50 rounded-xl border-none font-medium">
            <select id="bProd" onchange="toggleEtc('bProd', 'bEtc')" class="w-full p-4 bg-gray-50 rounded-xl border-none font-medium">
                <option value="인형">인형</option><option value="인형 걸이">인형 걸이</option><option value="키링">키링</option>
                <option value="북커버">북커버</option><option value="파우치">파우치</option><option value="기타">기타 직접입력</option>
            </select>
            <input type="text" id="bEtc" placeholder="제품명 입력" class="hidden w-full p-4 bg-orange-50 rounded-xl border-none ring-1 ring-orange-200">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="bSupply" placeholder="납품수량" class="p-4 bg-gray-50 rounded-xl border-none text-blue-600 font-bold">
                <input type="number" id="bSales" placeholder="판매수량" class="p-4 bg-gray-50 rounded-xl border-none text-red-600 font-bold">
            </div>
            <button onclick="saveData('basic')" class="w-full bg-gray-800 text-white p-4 rounded-xl font-bold">기록 저장</button>
        </section>

        <!-- 정산 입력 폼 -->
        <section id="settleInput" class="hidden bg-white p-6 rounded-3xl shadow-xl space-y-3 border-2 border-orange-500">
            <input type="date" id="sDate" class="w-full p-4 bg-gray-50 rounded-xl border-none font-medium">
            <select id="sProd" onchange="toggleEtc('sProd', 'sEtc')" class="w-full p-4 bg-gray-50 rounded-xl border-none font-medium">
                <option value="인형">인형</option><option value="인형 걸이">인형 걸이</option><option value="키링">키링</option>
                <option value="북커버">북커버</option><option value="파우치">파우치</option><option value="기타">기타 직접입력</option>
            </select>
            <input type="text" id="sEtc" placeholder="제품명 입력" class="hidden w-full p-4 bg-orange-50 rounded-xl border-none ring-1 ring-orange-200">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="sPrice" oninput="calcSettle('rate')" placeholder="단가" class="p-4 bg-gray-50 rounded-xl border-none">
                <input type="number" id="sQty" placeholder="판매갯수" class="p-4 bg-gray-50 rounded-xl border-none font-bold text-orange-500">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="sRate" oninput="calcSettle('rate')" placeholder="정산 %" class="p-4 bg-blue-50 rounded-xl border-none text-blue-600 font-bold">
                <input type="number" id="sTotal" oninput="calcSettle('total')" placeholder="정산금액" class="p-4 bg-green-50 rounded-xl border-none text-green-600 font-bold">
            </div>
            <button onclick="saveData('settle')" class="w-full bg-orange-500 text-white p-4 rounded-xl font-bold">정산 데이터 저장</button>
        </section>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 × 세발자전거</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.app",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allRecords = {};
        let productOrder = [];
        let mainChart = null;
        let editingId = null;

        const colorPalette = [
            { main: '#FFD93D', bg: 'rgba(255, 217, 61, 0.1)' },
            { main: '#FF8B13', bg: 'rgba(255, 139, 19, 0.1)' },
            { main: '#FF6B6B', bg: 'rgba(255, 107, 107, 0.1)' },
            { main: '#4D96FF', bg: 'rgba(77, 150, 255, 0.1)' },
            { main: '#6BCB77', bg: 'rgba(107, 203, 119, 0.1)' },
            { main: '#9D72FF', bg: 'rgba(157, 114, 255, 0.1)' }
        ];
        const productTheme = {};

        function init() {
            const now = new Date();
            document.getElementById('headerDate').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
            const monthFilter = document.getElementById('monthFilter');
            monthFilter.value = now.toISOString().substring(0, 7);
            monthFilter.addEventListener('change', processData);

            onValue(ref(db, 'records'), (snapshot) => {
                allRecords = snapshot.val() || {};
                processData();
            });
            onValue(ref(db, 'settings/order'), (snapshot) => {
                productOrder = snapshot.val() || ["고양이 인형", "고양이 키링", "북커버", "양면 파우치", "꽃수세미", "크로스백"];
                productOrder.forEach((name, i) => { 
                    productTheme[name] = colorPalette[i % colorPalette.length]; 
                });
                processData();
            });
        }

        function formatDate(dateStr) {
            if(!dateStr) return "";
            const parts = dateStr.split('-');
            return `${parts[0].substring(2)}년 ${parseInt(parts[1])}월 ${parseInt(parts[2])}일`;
        }

        function processData() {
            const summary = {}; let mSettle = 0; let mSales = 0; let tSettle = 0; let tSales = 0;
            const filterMonth = document.getElementById('monthFilter').value;
            const monthlyChartData = {};

            document.getElementById('monthlyTitle').innerText = `${filterMonth.substring(2,4)}년 ${parseInt(filterMonth.substring(5))}월`;

            Object.entries(allRecords).forEach(([id, rec]) => {
                let prod = rec.product || "미분류";
                if (prod === "결제") {
                    tSettle += Number(rec.settleAmount || 0);
                    if (rec.date?.startsWith(filterMonth)) mSettle += Number(rec.settleAmount || 0);
                    return;
                }
                if (!summary[prod]) summary[prod] = { supply: 0, sales: 0, allDetails: [] };
                summary[prod].supply += Number(rec.supplyCount || 0);
                summary[prod].sales += Number(rec.salesCount || 0);
                tSales += Number(rec.salesCount || 0);
                summary[prod].allDetails.push({ ...rec, id: id });

                if (rec.date?.startsWith(filterMonth)) {
                    mSales += Number(rec.salesCount || 0);
                    if (Number(rec.salesCount) > 0) monthlyChartData[prod] = (monthlyChartData[prod] || 0) + Number(rec.salesCount);
                }
            });

            renderStats(mSettle, mSales, tSettle, tSales);
            renderCards(summary);
            renderHistory(filterMonth);
            updateChart(monthlyChartData);
        }

        function renderStats(mSettle, mSales, tSettle, tSales) {
            document.getElementById('mAmount').innerText = mSettle.toLocaleString() + '원';
            document.getElementById('mCount').innerText = mSales + '개';
            document.getElementById('tAmount').innerText = tSettle.toLocaleString() + '원';
            document.getElementById('tCount').innerText = tSales + '개';
        }

        function renderCards(summary) {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            
            productOrder.forEach(name => {
                const data = summary[name] || { supply: 0, sales: 0, allDetails: [] };
                const stock = data.supply - data.sales;
                const theme = productTheme[name] || { main: '#ccc', bg: 'rgba(200,200,200,0.1)' };
                
                const card = document.createElement('div');
                card.setAttribute('data-id', name);
                card.style.backgroundColor = theme.bg;
                card.className = "backdrop-blur-sm rounded-[1.8rem] p-5 shadow-sm border border-white/40 mb-3 transition-all";
                
                const detailContent = data.allDetails.length > 0 
                    ? data.allDetails.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(d => 
                        `<div onclick="startEdit('${d.id}', ${JSON.stringify(d).replace(/"/g, '&quot;')})" 
                              class="grid grid-cols-12 items-center py-4 border-b border-black/5 last:border-0 px-2 active:bg-black/5 transition-colors cursor-pointer">
                            <span class="col-span-4 text-[13px] text-slate-400 font-bold">${formatDate(d.date)}</span>
                            <div class="col-span-8 flex justify-center gap-4 text-[13px] font-black">
                                <span class="text-blue-500">납품 ${d.supplyCount}개</span>
                                <span class="text-slate-300 font-normal opacity-50">|</span>
                                <span class="text-red-500">판매 ${d.salesCount}개</span>
                            </div>
                         </div>`).join('')
                    : `<div class="text-center py-8 text-slate-400 text-sm font-bold">기록이 없습니다.</div>`;

                card.innerHTML = `
                    <div class="flex justify-between items-center cursor-pointer" onclick="toggleDetail('${name}')">
                        <div class="flex items-center gap-4">
                            <div class="handle text-slate-400 text-xl opacity-60">≡</div>
                            <div class="w-3 h-3 rounded-full shadow-sm" style="background-color: ${theme.main}"></div>
                            <span class="font-black text-slate-800 text-base tracking-tight">${name}</span>
                        </div>
                        <div class="flex gap-5 text-sm font-black pr-2">
                            <div class="text-center min-w-[35px]"><p class="text-[9px] text-slate-400 mb-0.5">납품</p><p class="text-blue-500 text-base">${data.supply}</p></div>
                            <div class="text-center min-w-[35px]"><p class="text-[9px] text-slate-400 mb-0.5">판매</p><p class="text-red-500 text-base">${data.sales}</p></div>
                            <div class="text-center min-w-[35px]"><p class="text-[9px] text-slate-400 mb-0.5">재고</p><p class="${stock < 0 ? 'text-red-600' : 'text-slate-900'} text-base">${stock}</p></div>
                        </div>
                    </div>
                    <div id="detail-${name.replace(/\s+/g, '')}" class="hidden mt-4 bg-white/80 rounded-2xl overflow-hidden border border-white/60 shadow-inner">
                        ${detailContent}
                    </div>
                `;
                container.appendChild(card);
            });
            
            new Sortable(container, { 
                handle: '.handle', 
                animation: 200, 
                onEnd: () => {
                    const newOrder = Array.from(container.querySelectorAll('div[data-id]')).map(div => div.getAttribute('data-id'));
                    set(ref(db, 'settings/order'), newOrder);
                }
            });
        }

        window.toggleDetail = (name) => {
            const el = document.getElementById(`detail-${name.replace(/\s+/g, '')}`);
            el.classList.toggle('hidden');
        };

        window.startEdit = (id, rec) => {
            editingId = id;
            closeInputs();
            const target = rec.product === "결제" ? 'settleInput' : 'basicInput';
            document.getElementById(target).classList.remove('hidden');
            if (rec.product === "결제") {
                document.getElementById('sDate').value = rec.date;
                document.getElementById('sQty').value = rec.salesCount;
                document.getElementById('sTotal').value = rec.settleAmount;
            } else {
                document.getElementById('bDate').value = rec.date;
                const select = document.getElementById('bProd');
                if (Array.from(select.options).some(o => o.value === rec.product)) {
                    select.value = rec.product;
                } else {
                    select.value = '직접입력';
                    document.getElementById('bProdDirect').classList.remove('hidden');
                    document.getElementById('bProdDirect').value = rec.product;
                }
                document.getElementById('bSupply').value = rec.supplyCount;
                document.getElementById('bSales').value = rec.salesCount;
            }
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };

        function renderHistory(filterMonth) {
            const histBody = document.getElementById('historyList');
            histBody.innerHTML = '';
            const sortedRecords = Object.entries(allRecords)
                .filter(([_, rec]) => rec.date?.startsWith(filterMonth))
                .sort((a, b) => new Date(b[1].date) - new Date(a[1].date));

            sortedRecords.forEach(([id, rec]) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-4 bg-white/60 rounded-2xl mb-2 text-[13px] cursor-pointer border border-white/40 shadow-sm active:scale-[0.98] transition-all";
                div.onclick = () => startEdit(id, rec);
                const displayInfo = Number(rec.settleAmount) > 0 
                    ? `<span class="text-amber-600 font-black">[정산] ${rec.settleAmount.toLocaleString()}원</span>`
                    : `<span class="text-blue-500 font-bold">납품:${rec.supplyCount}</span> / <span class="text-red-500 font-bold">판매:${rec.salesCount}</span>`;
                div.innerHTML = `<div class="flex flex-col"><span class="text-[10px] text-slate-400 font-bold mb-0.5">${formatDate(rec.date)}</span><div class="leading-tight"><span class="font-black text-slate-800">${rec.product}</span> | ${displayInfo}</div></div><button onclick="event.stopPropagation(); deleteRecord('${id}')" class="p-2 text-slate-300">🗑️</button>`;
                histBody.appendChild(div);
            });
        }

        window.openInput = (type) => { editingId = null; closeInputs(); document.getElementById(type === 'basic' ? 'basicInput' : 'settleInput').classList.remove('hidden'); window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); };
        window.closeInputs = () => { document.getElementById('basicInput').classList.add('hidden'); document.getElementById('settleInput').classList.add('hidden'); document.querySelectorAll('input').forEach(i => { if(i.type === 'number' || i.type === 'text') i.value = ''; }); document.getElementById('bProd').value = ''; document.getElementById('bProdDirect').classList.add('hidden'); };
        window.saveData = (type) => {
            let data = { timestamp: serverTimestamp() };
            const prefix = type === 'basic' ? 'b' : 's';
            data.date = document.getElementById(`${prefix}Date`).value;
            if (type === 'basic') {
                const selectVal = document.getElementById('bProd').value;
                data.product = selectVal === '직접입력' ? document.getElementById('bProdDirect').value : selectVal;
                data.supplyCount = Number(document.getElementById('bSupply').value) || 0;
                data.salesCount = Number(document.getElementById('bSales').value) || 0;
            } else {
                data.product = "결제";
                data.settleAmount = Number(document.getElementById('sTotal').value) || 0;
                data.salesCount = Number(document.getElementById('sQty').value) || 0;
            }
            if (!data.product || !data.date) return alert("데이터를 완성해주세요!");
            const action = editingId ? update(ref(db, `records/${editingId}`), data) : push(ref(db, 'records'), data);
            action.then(() => { closeInputs(); });
        };
        window.deleteRecord = (id) => { if (confirm("삭제할까요?")) remove(ref(db, `records/${id}`)); };

        function updateChart(chartData) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            if (mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(chartData), datasets: [{ data: Object.values(chartData), backgroundColor: Object.keys(chartData).map(l => productTheme[l]?.main || '#eee'), borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '82%', responsive: true, maintainAspectRatio: false }
            });
        }
        window.onload = init;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 p-4 pb-48 overflow-x-hidden">
    <div class="max-w-md mx-auto space-y-6">
        <header class="flex justify-between items-center py-2 px-1">
            <div>
                <h1 class="text-xl font-black tracking-tighter">웃는 고양이 <span class="text-orange-500">×</span> 세발자전거</h1>
                <p id="headerDate" class="text-[10px] font-bold text-slate-400 mt-0.5 tracking-wider uppercase"></p>
            </div>
            <input type="month" id="monthFilter" class="bg-white border-none rounded-xl px-3 py-2 text-[11px] font-black shadow-sm outline-none">
        </header>

        <!-- 대시보드 -->
        <section class="bg-gradient-to-br from-orange-400 to-amber-500 rounded-[2.5rem] p-7 shadow-xl text-white relative overflow-hidden flex flex-col justify-between h-56">
            <div class="relative z-10">
                <p id="monthlyTitle" class="text-[10px] font-black opacity-80 uppercase tracking-widest mb-1"></p>
                <p id="mAmount" class="text-4xl font-black tracking-tight">0원</p>
                <p class="text-[10px] font-black text-black uppercase tracking-widest mt-6 mb-0.5">총 판매액</p>
                <p id="tAmount" class="text-2xl font-black text-black">0원</p>
            </div>
            <div class="absolute -right-4 top-1/2 -translate-y-1/2 w-44 h-44 opacity-40 z-0"><canvas id="salesChart"></canvas></div>
            <div class="relative z-10 flex gap-6 text-[11px] font-bold opacity-90 border-t border-white/20 pt-3">
                <p>월 판매 <span id="mCount" class="font-black">0개</span></p>
                <p>전체 판매 <span id="tCount" class="font-black">0개</span></p>
            </div>
        </section>

        <!-- 품목 리스트 -->
        <div id="cardContainer" class="space-y-3"></div>

        <!-- 활동 내역 -->
        <section class="bg-slate-200/30 p-6 rounded-[2.5rem] border border-white/60 backdrop-blur-md">
            <h3 class="font-black text-[10px] mb-6 text-slate-400 tracking-[0.3em] uppercase text-center">전체 활동 타임라인</h3>
            <div id="historyList"></div>
        </section>

        <!-- 하단 버튼 -->
        <div class="fixed bottom-8 left-6 right-6 max-w-md mx-auto grid grid-cols-2 gap-4 z-[100]">
            <button onclick="openInput('basic')" class="bg-slate-900 text-white py-5 rounded-[2.2rem] font-black shadow-2xl text-base active:scale-95 transition-all">📦 수량 기록</button>
            <button onclick="openInput('settle')" class="bg-orange-500 text-white py-5 rounded-[2.2rem] font-black shadow-2xl text-base active:scale-95 transition-all">💰 정산 기록</button>
        </div>

        <!-- 입력 패널 (수량) -->
        <section id="basicInput" class="hidden fixed inset-x-4 bottom-24 bg-white p-8 rounded-[3rem] shadow-[0_-20px_60px_rgba(0,0,0,0.15)] space-y-4 z-[101] border border-slate-100">
            <div class="flex justify-between items-center"><h2 class="font-black text-lg">데이터 기록/수정</h2><button onclick="closeInputs()" class="text-slate-300 text-2xl">✕</button></div>
            <input type="date" id="bDate" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm outline-none">
            <select id="bProd" onchange="this.value==='직접입력'?document.getElementById('bProdDirect').classList.remove('hidden'):document.getElementById('bProdDirect').classList.add('hidden')" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm outline-none">
                <option value="">품목을 선택하세요</option>
                <option value="고양이 인형">고양이 인형</option><option value="고양이 키링">고양이 키링</option><option value="북커버">북커버</option><option value="양면 파우치">양면 파우치</option><option value="꽃수세미">꽃수세미</option><option value="크로스백">크로스백</option><option value="직접입력">[직접입력]</option>
            </select>
            <input type="text" id="bProdDirect" placeholder="품목명 직접 입력" class="hidden w-full p-4 bg-orange-50 border border-orange-100 rounded-2xl font-bold text-sm">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1"><p class="text-[10px] font-black text-blue-500 ml-2">납품 수량</p><input type="number" id="bSupply" class="w-full p-5 bg-blue-50 rounded-2xl font-black text-blue-600 text-center text-xl outline-none"></div>
                <div class="space-y-1"><p class="text-[10px] font-black text-red-500 ml-2">판매 수량</p><input type="number" id="bSales" class="w-full p-5 bg-red-50 rounded-2xl font-black text-red-600 text-center text-xl outline-none"></div>
            </div>
            <button onclick="saveData('basic')" class="w-full bg-slate-900 text-white p-5 rounded-[1.8rem] font-black mt-2 text-lg">데이터 저장</button>
        </section>

        <!-- 입력 패널 (정산) -->
        <section id="settleInput" class="hidden fixed inset-x-4 bottom-24 bg-white p-8 rounded-[3rem] shadow-[0_-20px_60px_rgba(0,0,0,0.15)] space-y-4 z-[101] border border-slate-100">
            <div class="flex justify-between items-center"><h2 class="font-black text-lg text-orange-600">정산 기록/수정</h2><button onclick="closeInputs()" class="text-slate-300 text-2xl">✕</button></div>
            <input type="date" id="sDate" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm outline-none">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1"><p class="text-[10px] font-black text-slate-400 ml-2">총 판매수</p><input type="number" id="sQty" class="w-full p-5 bg-slate-50 rounded-2xl font-bold text-center text-lg outline-none"></div>
                <div class="space-y-1"><p class="text-[10px] font-black text-orange-600 ml-2">최종 정산금</p><input type="number" id="sTotal" class="w-full p-5 bg-orange-50 rounded-2xl font-black text-orange-600 text-center text-lg outline-none"></div>
            </div>
            <button onclick="saveData('settle')" class="w-full bg-orange-500 text-white p-5 rounded-[1.8rem] font-black mt-2 text-lg">정산 완료</button>
        </section>
    </div>
</body>
</html>

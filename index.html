<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이×세발자전거 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.com",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            measurementId: "G-TRXM2NZ5FF",
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allRecords = {};

        function init() {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('headerDate').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일(${days[now.getDay()]})`;
            document.querySelectorAll('input[type="date"]').forEach(el => el.valueAsDate = now);
        }

        onValue(ref(db, 'records'), (snapshot) => {
            allRecords = snapshot.val() || {};
            const summary = {};
            let monthlySettle = 0; let monthlySales = 0;
            let totalSettle = 0; let totalSales = 0;
            
            const currentMonth = new Date().toISOString().substring(0, 7);

            Object.values(allRecords).forEach(rec => {
                const prod = rec.product || "";
                
                // 1. 재고 계산 (제품명이 '결제'가 아닌 경우만)
                if (prod !== "결제" && prod !== "통합결제") {
                    if (!summary[prod]) summary[prod] = { supply: 0, sales: 0 };
                    summary[prod].supply += Number(rec.supplyCount || 0);
                    summary[prod].sales += Number(rec.salesCount || 0);
                }

                // 2. 누적 금액 계산 (모든 'settleAmount' 합산)
                const sAmount = Number(rec.settleAmount || 0);
                const sQty = Number(rec.salesCount || 0);
                
                totalSettle += sAmount;
                totalSales += sQty;

                // 3. 이번 달 계산
                if (rec.date && rec.date.startsWith(currentMonth)) {
                    monthlySettle += sAmount;
                    monthlySales += sQty;
                }
            });
            
            renderTable(summary);
            renderStats(monthlySettle, monthlySales, totalSettle, totalSales);
        });

        function renderTable(summary) {
            const body = document.getElementById('inventoryBody');
            body.innerHTML = '';
            const defaults = ["고양이 인형", "고양이 키링", "북커버", "양면 파우치", "꽃수세미"];
            const products = Array.from(new Set([...defaults, ...Object.keys(summary)]));
            products.forEach(name => {
                const { supply, sales } = summary[name] || { supply: 0, sales: 0 };
                const stock = supply - sales;
                const tr = document.createElement('tr');
                tr.className = "border-b text-sm cursor-pointer hover:bg-orange-50 transition-colors";
                tr.onclick = () => showDetails('product', name);
                tr.innerHTML = `<td class="p-4 font-medium">${name}</td><td class="p-4 text-center text-blue-500">${supply}</td><td class="p-4 text-center text-red-500">${sales}</td><td class="p-4 text-center font-black text-gray-800">${stock}</td>`;
                body.appendChild(tr);
            });
        }

        function renderStats(mSettle, mSales, tSettle, tSales) {
            document.getElementById('mAmount').innerText = mSettle.toLocaleString() + '원';
            document.getElementById('mCount').innerText = mSales + '개';
            document.getElementById('tAmount').innerText = tSettle.toLocaleString() + '원';
            document.getElementById('tCount').innerText = tSales + '개';
        }

        window.showDetails = (mode, value) => {
            const detailSection = document.getElementById('detailSection');
            const detailTitle = document.getElementById('detailTitle');
            const detailList = document.getElementById('detailList');
            detailSection.classList.remove('hidden');
            detailTitle.innerText = mode === 'product' ? `[${value}] 상세 기록` : `📅 ${value} 기록 현황`;
            detailList.innerHTML = '';
            let filtered = Object.entries(allRecords).filter(([id, rec]) => mode === 'product' ? rec.product === value : rec.date === value);
            filtered.sort((a, b) => new Date(b[1].date) - new Date(a[1].date));
            filtered.forEach(([id, rec]) => {
                const div = document.createElement('div');
                div.className = "bg-gray-50 p-4 rounded-2xl space-y-2 border border-gray-100 mb-3";
                div.innerHTML = `<div class="flex justify-between items-start"><span class="text-xs font-bold text-orange-400">${mode === 'product' ? rec.date : rec.product}</span><button onclick="deleteRecord('${id}')" class="text-[10px] text-red-400">삭제</button></div>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <div><label class="text-[10px] text-gray-400">납품</label><input type="number" value="${rec.supplyCount || 0}" onchange="updateValue('${id}', 'supplyCount', this.value)" class="w-full p-2 bg-white rounded-lg border-none text-sm font-bold text-blue-600"></div>
                        <div><label class="text-[10px] text-gray-400">판매</label><input type="number" value="${rec.salesCount || 0}" onchange="updateValue('${id}', 'salesCount', this.value)" class="w-full p-2 bg-white rounded-lg border-none text-sm font-bold text-red-600"></div>
                    </div>${rec.settleAmount ? `<div class="mt-2 pt-2 border-t border-dashed flex justify-between"><span class="text-[10px] text-gray-400">합계 수량: ${rec.salesCount}개</span><span class="text-[10px] text-green-600 font-bold">${rec.settleAmount.toLocaleString()}원</span></div>` : ''}`;
                detailList.appendChild(div);
            });
            detailSection.scrollIntoView({ behavior: 'smooth' });
        };

        window.updateValue = (id, field, value) => update(ref(db, `records/${id}`), { [field]: Number(value) });
        window.deleteRecord = (id) => confirm("삭제하시겠습니까?") && remove(ref(db, `records/${id}`));
        window.openCalendar = () => document.getElementById('historyDatePicker').classList.toggle('hidden');

        window.saveData = (type) => {
            let product, supply = 0, sales = 0, price = 0, settle = 0, date;
            if (type === 'basic') {
                date = document.getElementById('bDate').value;
                product = document.getElementById('bProd').value === '기타' ? document.getElementById('bEtc').value : document.getElementById('bProd').value;
                supply = Number(document.getElementById('bSupply').value) || 0;
                sales = Number(document.getElementById('bSales').value) || 0;
            } else {
                date = document.getElementById('sDate').value;
                product = document.getElementById('sProd').value === '기타' ? document.getElementById('sEtc').value : document.getElementById('sProd').value;
                settle = Number(document.getElementById('sTotal').value) || 0;
                sales = Number(document.getElementById('sQty').value) || 0;
            }
            if (!product) return alert("제품명 입력!");
            push(ref(db, 'records'), { date, product, supplyCount: supply, salesCount: sales, price, settleAmount: settle, timestamp: serverTimestamp() })
                .then(() => { alert("저장 완료!"); document.querySelectorAll('input[type="number"]').forEach(i => i.value = ''); });
        };

        window.toggleEtc = (selectId, etcId) => document.getElementById(etcId).classList.toggle('hidden', document.getElementById(selectId).value !== '기타');
        window.calcSettle = (base) => {
            const price = Number(document.getElementById('sPrice').value) || 0;
            const rate = Number(document.getElementById('sRate').value) || 0;
            const total = Number(document.getElementById('sTotal').value) || 0;
            if (base === 'rate' && price) document.getElementById('sTotal').value = Math.round(price * (rate / 100));
            else if (base === 'total' && price) document.getElementById('sRate').value = ((total / price) * 100).toFixed(1);
        };

        window.onload = init;
    </script>
</head>
<body class="bg-gray-100 p-4 pb-24">
    <div class="max-w-md mx-auto space-y-4">
        <!-- 헤더 -->
        <header class="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm border-b-4 border-orange-100">
            <h1 class="text-xl font-black text-gray-800 tracking-tighter">웃는 고양이<span class="text-orange-500 mx-1">×</span>세발자전거</h1>
            <div class="relative">
                <button onclick="openCalendar()" id="headerDate" class="text-[10px] font-bold text-gray-400 bg-gray-50 px-3 py-2 rounded-full border border-gray-100"></button>
                <div id="historyDatePicker" class="hidden mt-2 p-4 bg-white rounded-3xl shadow-2xl border absolute right-0 z-20 w-64">
                    <input type="date" onchange="showDetails('date', this.value); document.getElementById('historyDatePicker').classList.add('hidden')" class="w-full p-3 bg-orange-50 rounded-xl border-none font-bold">
                </div>
            </div>
        </header>

        <!-- 정산 요약 카드 -->
        <section class="bg-gray-900 p-6 rounded-3xl shadow-xl text-white space-y-6">
            <div>
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-xs font-bold text-orange-400">이번 달 현황 (MONTHLY)</h2>
                    <span id="mCount" class="text-xs bg-orange-500/20 text-orange-400 px-2 py-1 rounded-md font-bold">0개</span>
                </div>
                <p id="mAmount" class="text-3xl font-black tracking-tight">0원</p>
            </div>
            <div class="pt-4 border-t border-gray-800">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-xs font-bold text-gray-500">누적 총 실적 (TOTAL)</h2>
                    <span id="tCount" class="text-xs bg-gray-700 text-gray-400 px-2 py-1 rounded-md font-bold">0개</span>
                </div>
                <p id="tAmount" class="text-xl font-bold text-gray-300">0원</p>
            </div>
        </section>

        <!-- 재고 현황판 -->
        <section class="bg-white rounded-3xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-[10px] text-gray-400 uppercase tracking-widest">
                    <tr><th class="p-4 text-gray-500">제품명</th><th class="p-4 text-center">납품</th><th class="p-4 text-center">판매</th><th class="p-4 text-center text-orange-500">재고</th></tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </section>

        <!-- 상세창 -->
        <section id="detailSection" class="hidden bg-white p-6 rounded-3xl shadow-2xl border-2 border-orange-400 space-y-4">
            <div class="flex justify-between items-center"><h3 id="detailTitle" class="font-black text-gray-800 text-sm"></h3><button onclick="document.getElementById('detailSection').classList.add('hidden')" class="text-gray-400 text-xl">&times;</button></div>
            <div id="detailList" class="max-h-80 overflow-y-auto space-y-3 pr-1"></div>
        </section>

        <!-- 입력 메뉴 -->
        <div class="grid grid-cols-2 gap-3">
            <button onclick="document.getElementById('basicInput').classList.toggle('hidden'); document.getElementById('settleInput').classList.add('hidden')" class="bg-gray-800 text-white p-4 rounded-2xl font-bold text-sm">📦 수량 기록</button>
            <button onclick="document.getElementById('settleInput').classList.toggle('hidden'); document.getElementById('basicInput').classList.add('hidden')" class="bg-orange-500 text-white p-4 rounded-2xl font-bold text-sm">💰 정산 기록</button>
        </div>

        <!-- 수량 입력 -->
        <section id="basicInput" class="hidden bg-white p-6 rounded-3xl shadow-xl space-y-3 border-2 border-gray-800">
            <input type="date" id="bDate" class="w-full p-4 bg-gray-50 rounded-xl border-none">
            <select id="bProd" onchange="toggleEtc('bProd', 'bEtc')" class="w-full p-4 bg-gray-50 rounded-xl border-none">
                <option value="고양이 인형">고양이 인형</option>
                <option value="고양이 키링">고양이 키링</option>
                <option value="북커버">북커버</option>
                <option value="양면 파우치">양면 파우치</option>
                <option value="꽃수세미">꽃수세미</option>
                <option value="기타">기타 직접입력</option>
            </select>
            <input type="text" id="bEtc" placeholder="제품명 입력" class="hidden w-full p-4 bg-orange-50 rounded-xl border-none ring-1 ring-orange-200">
            <div class="grid grid-cols-2 gap-2"><input type="number" id="bSupply" placeholder="납품수량" class="p-4 bg-gray-50 rounded-xl border-none text-blue-600 font-bold"><input type="number" id="bSales" placeholder="판매수량" class="p-4 bg-gray-50 rounded-xl border-none text-red-600 font-bold"></div>
            <button onclick="saveData('basic')" class="w-full bg-gray-800 text-white p-4 rounded-xl font-bold">기록 저장</button>
        </section>

        <!-- 정산 입력 -->
        <section id="settleInput" class="hidden bg-white p-6 rounded-3xl shadow-xl space-y-3 border-2 border-orange-500">
            <input type="date" id="sDate" class="w-full p-4 bg-gray-50 rounded-xl border-none">
            <select id="sProd" onchange="toggleEtc('sProd', 'sEtc')" class="w-full p-4 bg-gray-50 rounded-xl border-none">
                <option value="결제">통합 정산 (묶음)</option>
                <option value="고양이 인형">고양이 인형</option>
                <option value="고양이 키링">고양이 키링</option>
                <option value="북커버">북커버</option>
                <option value="양면 파우치">양면 파우치</option>
                <option value="기타">기타 직접입력</option>
            </select>
            <input type="text" id="sEtc" placeholder="제품명 입력" class="hidden w-full p-4 bg-orange-50 rounded-xl border-none ring-1 ring-orange-200">
            <div class="grid grid-cols-2 gap-2"><input type="number" id="sQty" placeholder="총 판매수량" class="p-4 bg-gray-50 rounded-xl border-none font-bold text-orange-500"><input type="number" id="sTotal" placeholder="정산금액" class="p-4 bg-green-50 rounded-xl border-none text-green-600 font-bold"></div>
            <p class="text-[10px] text-gray-400 px-2">* '통합 정산' 선택 시 여러 제품의 합계 수량과 금액만 넣으시면 됩니다.</p>
            <button onclick="saveData('settle')" class="w-full bg-orange-500 text-white p-4 rounded-xl font-bold">정산 데이터 저장</button>
        </section>
    </div>
</body>
</html>

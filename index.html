<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 × 세발자전거</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.app",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allRecords = {};
        let productOrder = [];
        let mainChart = null;

        function init() {
            const now = new Date();
            document.getElementById('headerDate').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
            const monthFilter = document.getElementById('monthFilter');
            monthFilter.value = now.toISOString().substring(0, 7);
            monthFilter.addEventListener('change', processData);

            onValue(ref(db, 'records'), (snapshot) => {
                allRecords = snapshot.val() || {};
                processData();
            });
            onValue(ref(db, 'settings/order'), (snapshot) => {
                productOrder = snapshot.val() || ["고양이 인형", "고양이 키링", "북커버", "양면 파우치", "꽃수세미", "크로스백"];
                processData();
            });
        }

        function processData() {
            const summary = {};
            let mSettle = 0; let mSales = 0;
            let tSettle = 0; let tSales = 0;
            const filterMonth = document.getElementById('monthFilter').value;
            const monthlyChartData = {};

            // 1차 순회: 전체 요약 계산 (재고 계산용)
            Object.values(allRecords).forEach(rec => {
                let prod = rec.product || "미분류";
                if (prod.includes("고양이 인형")) prod = "고양이 인형";
                if (prod === "결제") return;

                if (!summary[prod]) summary[prod] = { supply: 0, sales: 0 };
                summary[prod].supply += Number(rec.supplyCount || 0);
                summary[prod].sales += Number(rec.salesCount || 0);

                const sAmount = Number(rec.settleAmount || 0);
                tSettle += sAmount;
                tSales += Number(rec.salesCount || 0);
                if (rec.date && rec.date.startsWith(filterMonth)) {
                    mSettle += sAmount;
                    mSales += Number(rec.salesCount || 0);
                }
            });

            // 필터링된 달의 차트 데이터 추출
            Object.values(allRecords).forEach(rec => {
                if (rec.date && rec.date.startsWith(filterMonth)) {
                    let prod = rec.product || "미분류";
                    if (prod.includes("고양이 인형")) prod = "고양이 인형";
                    if (prod !== "결제" && Number(rec.salesCount) > 0) {
                        monthlyChartData[prod] = (monthlyChartData[prod] || 0) + Number(rec.salesCount);
                    }
                }
            });

            renderStats(mSettle, mSales, tSettle, tSales);
            renderTable(summary);
            renderHistory(filterMonth, summary); // 재고 정보 전달
            updateChart(monthlyChartData);
        }

        function renderStats(mSettle, mSales, tSettle, tSales) {
            document.getElementById('mAmount').innerText = mSettle.toLocaleString() + '원';
            document.getElementById('mCount').innerText = mSales + '개';
            document.getElementById('tAmount').innerHTML = `<span class="text-black font-black">${tSettle.toLocaleString()}원</span>`;
            document.getElementById('tCount').innerHTML = `<span class="text-black font-black">${tSales}개</span>`;
        }

        function renderTable(summary) {
            const body = document.getElementById('inventoryBody');
            body.innerHTML = '';
            let displayList = productOrder.filter(p => summary[p]);
            Object.keys(summary).forEach(p => { if(!displayList.includes(p)) displayList.push(p); });

            displayList.forEach(name => {
                const { supply, sales } = summary[name];
                const stock = supply - sales;
                const tr = document.createElement('tr');
                tr.className = "border-b text-sm bg-white";
                tr.setAttribute('data-id', name);
                tr.innerHTML = `<td class="p-4 cursor-move text-gray-300 handle">≡</td><td class="p-4 font-medium">${name}</td><td class="p-4 text-center text-blue-500 font-bold">${supply}</td><td class="p-4 text-center text-red-500 font-bold">${sales}</td><td class="p-4 text-center font-black ${stock < 0 ? 'text-red-600' : 'text-gray-800'}">${stock}</td><td class="p-4 text-center"></td>`;
                body.appendChild(tr);
            });
            new Sortable(body, { handle: '.handle', animation: 150, onEnd: () => {
                const newOrder = Array.from(body.querySelectorAll('tr')).map(tr => tr.getAttribute('data-id'));
                set(ref(db, 'settings/order'), newOrder);
            }});
        }

        function renderHistory(filterMonth, summary) {
            const histBody = document.getElementById('historyList');
            const histTitle = document.getElementById('historyTitle');
            
            // 제목 업데이트 (예: 2026년 03월 상세 내역)
            const [year, month] = filterMonth.split('-');
            histTitle.innerText = `📅 ${year}년 ${month}월 상세 내역`;

            histBody.innerHTML = '';
            const sortedRecords = Object.entries(allRecords)
                .filter(([_, rec]) => rec.date && rec.date.startsWith(filterMonth))
                .sort((a, b) => new Date(b[1].date) - new Date(a[1].date));

            sortedRecords.forEach(([id, rec]) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-4 bg-slate-50 rounded-2xl mb-2 text-xs active:bg-slate-200 transition-colors cursor-pointer";
                div.onclick = (e) => { if(e.target.tagName !== 'BUTTON') prepareEdit(id, rec); };
                
                let prodName = rec.product;
                if (prodName.includes("고양이 인형")) prodName = "고양이 인형";
                
                const currentStock = summary[prodName] ? (summary[prodName].supply - summary[prodName].sales) : '-';
                const isSettle = Number(rec.settleAmount) > 0;
                
                const info = isSettle 
                    ? `<span class="text-orange-600 font-bold">[정산] ${rec.settleAmount.toLocaleString()}원 (${rec.salesCount}개 / 재고:${currentStock})</span>` 
                    : `<span class="text-blue-600 font-bold">[수량] 납품:${rec.supplyCount}/판매:${rec.salesCount} (재고:${currentStock})</span>`;

                div.innerHTML = `<div class="flex flex-col"><span class="text-[10px] text-gray-400">${rec.date}</span><span class="font-bold text-slate-700">${rec.product} | ${info}</span></div><button onclick="deleteRecord('${id}', '${rec.product}')" class="p-2 text-red-300">🗑️</button>`;
                histBody.appendChild(div);
            });
        }

        window.prepareEdit = (id, rec) => {
            const isSettle = Number(rec.settleAmount) > 0;
            if (isSettle) {
                document.getElementById('settleInput').classList.remove('hidden');
                document.getElementById('basicInput').classList.add('hidden');
                document.getElementById('sDate').value = rec.date;
                document.getElementById('sProd').value = rec.product;
                document.getElementById('sQty').value = rec.salesCount;
                document.getElementById('sTotal').value = rec.settleAmount;
            } else {
                document.getElementById('basicInput').classList.remove('hidden');
                document.getElementById('settleInput').classList.add('hidden');
                document.getElementById('bDate').value = rec.date;
                document.getElementById('bProd').value = rec.product;
                document.getElementById('bSupply').value = rec.supplyCount;
                document.getElementById('bSales').value = rec.salesCount;
            }
            window.editingId = id;
            window.scrollTo({ top: 500, behavior: 'smooth' });
            alert("입력창에 내용을 채웠습니다. 수정한 뒤 저장하세요.");
        };

        window.deleteRecord = (id, prod) => {
            if (confirm("이 기록을 삭제하시겠습니까?")) remove(ref(db, `records/${id}`));
        };

        function updateChart(chartData) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            let labels = Object.keys(chartData); let data = Object.values(chartData);
            if (data.length === 0) { labels = ['기록없음']; data = [1]; }
            if (mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: data, backgroundColor: ['#ffeaa7','#fab1a0','#ff7675','#fdcb6e','#e17055','#d63031'], borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '75%', responsive: true, maintainAspectRatio: false }
            });
        }

        window.saveData = (type) => {
            let data = { timestamp: serverTimestamp() };
            const prefix = type === 'basic' ? 'b' : 's';
            data.date = document.getElementById(`${prefix}Date`).value;
            data.product = document.getElementById(`${prefix}Prod`).value;
            if (type === 'basic') {
                data.supplyCount = Number(document.getElementById('bSupply').value) || 0;
                data.salesCount = Number(document.getElementById('bSales').value) || 0;
            } else {
                data.settleAmount = Number(document.getElementById('sTotal').value) || 0;
                data.salesCount = Number(document.getElementById('sQty').value) || 0;
            }
            if (!data.product) return alert("품목을 선택하세요!");

            if (window.editingId) {
                remove(ref(db, `records/${window.editingId}`));
                window.editingId = null;
            }

            push(ref(db, 'records'), data).then(() => { 
                alert("저장되었습니다!");
                document.getElementById('basicInput').classList.add('hidden');
                document.getElementById('settleInput').classList.add('hidden');
            });
        };

        window.calcSettle = () => {
            const price = Number(document.getElementById('sPrice').value) || 0;
            const rate = Number(document.getElementById('sRate').value) || 0;
            const qty = Number(document.getElementById('sQty').value) || 1;
            document.getElementById('sTotal').value = Math.round((price * (rate / 100)) * qty);
        };

        window.onload = init;
    </script>
    <style> .orange-grad { background: linear-gradient(135deg, #ff8c42 0%, #ff5e3a 100%); } </style>
</head>
<body class="bg-slate-50 p-4 pb-40 font-sans tracking-tight text-slate-900">
    <div class="max-w-md mx-auto space-y-5">
        <header class="flex justify-between items-start py-4">
            <div><h1 class="text-2xl font-black">웃는 고양이 <span class="text-orange-500">×</span> 세발자전거</h1><p id="headerDate" class="text-xs font-bold text-slate-400 mt-1"></p></div>
            <input type="month" id="monthFilter" class="bg-white border-none rounded-2xl px-4 py-2 text-xs font-black shadow-sm">
        </header>

        <section class="orange-grad rounded-[2.5rem] p-8 shadow-2xl text-white space-y-8 relative overflow-hidden">
            <div class="relative z-10"><p class="text-[10px] font-black opacity-80 uppercase mb-1">이번 달 정산액</p><p id="mAmount" class="text-5xl font-black mb-1">0원</p><p class="text-xs font-bold opacity-90">이달 판매량: <span id="mCount">0개</span></p></div>
            <div class="flex items-center justify-between pt-6 border-t border-white/20 relative z-10">
                <div><p class="text-[10px] font-bold opacity-70">총 판매액</p><p id="tAmount" class="text-lg font-black"></p></div>
                <div class="text-right"><p class="text-[10px] font-bold opacity-70">총 판매수</p><p id="tCount" class="text-lg font-black"></p></div>
            </div>
            <div class="absolute -right-4 top-6 w-32 h-32"><canvas id="salesChart"></canvas></div>
        </section>

        <section class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-slate-100">
            <table class="w-full text-center"><thead class="bg-slate-50/50 text-[10px] font-black text-slate-400"><tr><th></th><th class="p-4 text-left">품목</th><th>납품</th><th class="text-orange-500">판매</th><th>재고</th><th></th></tr></thead><tbody id="inventoryBody" class="divide-y divide-slate-50"></tbody></table>
        </section>

        <section class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
            <h3 id="historyTitle" class="font-black text-sm mb-4 text-slate-400 uppercase tracking-widest">📅 이달의 상세 내역</h3>
            <div id="historyList" class="max-h-80 overflow-y-auto pr-2"></div>
        </section>

        <div class="fixed bottom-8 left-4 right-4 max-w-md mx-auto grid grid-cols-2 gap-4 z-50">
            <button onclick="document.getElementById('basicInput').classList.toggle('hidden'); document.getElementById('settleInput').classList.add('hidden')" class="bg-slate-900 text-white p-5 rounded-[2rem] font-black shadow-2xl">📦 수량 기록</button>
            <button onclick="document.getElementById('settleInput').classList.toggle('hidden'); document.getElementById('basicInput').classList.add('hidden')" class="bg-orange-500 text-white p-5 rounded-[2rem] font-black shadow-2xl">💰 정산 기록</button>
        </div>

        <section id="basicInput" class="hidden bg-white p-8 rounded-[3rem] shadow-2xl space-y-4 mb-20">
            <h2 class="font-black text-lg">📦 수량 입력/수정</h2>
            <input type="date" id="bDate" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold">
            <select id="bProd" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold">
                <option value="">제품 선택</option><option value="고양이 인형">고양이 인형</option><option value="고양이 키링">고양이 키링</option><option value="북커버">북커버</option><option value="양면 파우치">양면 파우치</option><option value="꽃수세미">꽃수세미</option><option value="크로스백">크로스백</option>
            </select>
            <div class="grid grid-cols-2 gap-3"><input type="number" id="bSupply" placeholder="납품(+)" class="p-4 bg-blue-50 text-blue-600 rounded-2xl border-none font-black text-center"><input type="number" id="bSales" placeholder="판매(-)" class="p-4 bg-red-50 text-red-600 rounded-2xl border-none font-black text-center"></div>
            <button onclick="saveData('basic')" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black">저장하기</button>
        </section>

        <section id="settleInput" class="hidden bg-white p-8 rounded-[3rem] shadow-2xl space-y-4 mb-20">
            <h2 class="font-black text-lg text-orange-600">💰 정산 입력/수정</h2>
            <input type="date" id="sDate" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold">
            <select id="sProd" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold">
                <option value="결제">통합 정산 (결제)</option><option value="고양이 인형">고양이 인형</option><option value="고양이 키링">고양이 키링</option><option value="북커버">북커버</option><option value="양면 파우치">양면 파우치</option><option value="꽃수세미">꽃수세미</option><option value="크로스백">크로스백</option>
            </select>
            <div class="grid grid-cols-2 gap-2"><input type="number" id="sPrice" placeholder="단가" oninput="calcSettle()" class="p-4 bg-slate-50 rounded-xl font-bold"><input type="number" id="sRate" placeholder="정산율%" oninput="calcSettle()" class="p-4 bg-slate-50 rounded-xl font-bold"></div>
            <div class="grid grid-cols-2 gap-2"><input type="number" id="sQty" placeholder="수량" oninput="calcSettle()" class="p-4 bg-slate-50 rounded-xl font-bold"><input type="number" id="sTotal" placeholder="정산금" class="p-4 bg-orange-50 text-orange-600 rounded-xl font-black"></div>
            <button onclick="saveData('settle')" class="w-full bg-orange-500 text-white p-5 rounded-2xl font-black">저장하기</button>
        </section>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 × 세발자전거</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // [기존 Firebase 설정 유지]
        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.com",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            measurementId: "G-TRXM2NZ5FF",
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allRecords = {};
        let productOrder = [];
        let mainChart = null;

        const DEFAULT_PRODUCTS = ["고양이 인형", "고양이 키링", "북커버", "양면 파우치", "꽃수세미", "크로스백"];

        function init() {
            const now = new Date();
            document.getElementById('headerDate').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
            document.querySelectorAll('input[type="date"]').forEach(el => el.valueAsDate = now);
            
            const monthFilter = document.getElementById('monthFilter');
            monthFilter.value = now.toISOString().substring(0, 7);
            monthFilter.addEventListener('change', processData);

            onValue(ref(db, 'records'), (snapshot) => {
                allRecords = snapshot.val() || {};
                processData();
            });

            onValue(ref(db, 'settings/order'), (snapshot) => {
                productOrder = snapshot.val() || DEFAULT_PRODUCTS;
                processData();
            });
        }

        function processData() {
            const summary = {};
            let monthlySettle = 0; let monthlySales = 0;
            let totalSettle = 0; let totalSales = 0;
            const filterMonth = document.getElementById('monthFilter').value;
            const monthlyChartData = {};

            Object.values(allRecords).forEach(rec => {
                const sAmount = Number(rec.settleAmount || 0);
                const sQty = Number(rec.salesCount || 0);
                const iQty = Number(rec.supplyCount || 0);
                let prod = rec.product || "미분류";

                // [중요] '결제' 여부와 상관없이 누적 금액은 무조건 먼저 더합니다.
                totalSettle += sAmount;
                totalSales += sQty;

                if (rec.date && rec.date.startsWith(filterMonth)) {
                    monthlySettle += sAmount;
                    monthlySales += sQty;
                    // 차트에는 '결제' 제외하고 수량만 표시
                    if (sQty > 0 && prod !== "결제") {
                        monthlyChartData[prod] = (monthlyChartData[prod] || 0) + sQty;
                    }
                }

                // [필터] 재고 목록(표)에서는 '결제' 항목을 제외합니다.
                if (prod === "결제") return; 

                if (!summary[prod]) summary[prod] = { supply: 0, sales: 0 };
                summary[prod].supply += iQty;
                summary[prod].sales += sQty;
            });

            renderStats(monthlySettle, monthlySales, totalSettle, totalSales);
            renderTable(summary);
            updateChart(monthlyChartData);
        }

        function renderStats(mSettle, mSales, tSettle, tSales) {
            document.getElementById('mAmount').innerText = mSettle.toLocaleString() + '원';
            document.getElementById('mCount').innerText = mSales + '개';
            
            // 총 판매액 색상: 눈에 확 띄는 블루-블랙 조합으로 강조
            document.getElementById('tAmount').innerHTML = `<span style="color: #001eff; font-weight: 900;">${tSettle.toLocaleString()}원</span>`;
            document.getElementById('tCount').innerHTML = `<span style="color: #001eff; font-weight: 900;">${tSales}개</span>`;
        }

        // ... (이하 차트, 테이블 렌더링 및 저장 로직은 기존과 동일)
        // [코드 가독성을 위해 생략되었으나 이전 답변의 전체 기능이 모두 포함되어야 합니다]
        // [위 processData와 renderStats 함수만 이 내용으로 교체하시면 됩니다]

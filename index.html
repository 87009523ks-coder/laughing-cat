<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 × 세발자전거</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.app",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allRecords = {};
        let productOrder = [];
        let mainChart = null;

        // 품목별 고정 컬러맵 (그래프와 표를 일치시키기 위함)
        const colorPalette = ['#FFD93D', '#FF8B13', '#FF6B6B', '#4D96FF', '#6BCB77', '#9D72FF'];
        const productColors = {};

        function init() {
            const now = new Date();
            document.getElementById('headerDate').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
            const monthFilter = document.getElementById('monthFilter');
            monthFilter.value = now.toISOString().substring(0, 7);
            monthFilter.addEventListener('change', processData);

            onValue(ref(db, 'records'), (snapshot) => {
                allRecords = snapshot.val() || {};
                processData();
            });
            onValue(ref(db, 'settings/order'), (snapshot) => {
                productOrder = snapshot.val() || ["고양이 인형", "고양이 키링", "북커버", "양면 파우치", "꽃수세미", "크로스백"];
                productOrder.forEach((name, i) => { productColors[name] = colorPalette[i % colorPalette.length]; });
                processData();
            });
        }

        function processData() {
            const summary = {}; const monthlySummary = {};
            let mSettle = 0; let mSales = 0; let tSettle = 0; let tSales = 0;
            const filterMonth = document.getElementById('monthFilter').value;
            const [fYear, fMonth] = filterMonth.split('-');
            
            document.getElementById('settleTitle').innerText = `${parseInt(fMonth)}월 정산액`;
            document.getElementById('salesTitle').innerText = `${parseInt(fMonth)}월 판매량`;

            const monthlyChartData = {};

            Object.values(allRecords).forEach(rec => {
                let prod = rec.product || "미분류";
                if (prod.includes("고양이 인형")) prod = "고양이 인형";
                
                if (prod === "결제") {
                    tSettle += Number(rec.settleAmount || 0);
                    if (rec.date && rec.date.startsWith(filterMonth)) mSettle += Number(rec.settleAmount || 0);
                    return;
                }

                if (!summary[prod]) summary[prod] = { supply: 0, sales: 0 };
                summary[prod].supply += Number(rec.supplyCount || 0);
                summary[prod].sales += Number(rec.salesCount || 0);
                tSales += Number(rec.salesCount || 0);

                if (rec.date && rec.date.startsWith(filterMonth)) {
                    mSales += Number(rec.salesCount || 0);
                    if (!monthlySummary[prod]) monthlySummary[prod] = { supply: 0, sales: 0 };
                    monthlySummary[prod].supply += Number(rec.supplyCount || 0);
                    monthlySummary[prod].sales += Number(rec.salesCount || 0);
                    if (Number(rec.salesCount) > 0) {
                        monthlyChartData[prod] = (monthlyChartData[prod] || 0) + Number(rec.salesCount);
                    }
                }
            });

            renderStats(mSettle, mSales, tSettle, tSales);
            renderTable(summary);
            renderHistory(filterMonth);
            updateChart(monthlyChartData);
        }

        function renderStats(mSettle, mSales, tSettle, tSales) {
            document.getElementById('mAmount').innerText = mSettle.toLocaleString() + '원';
            document.getElementById('mCount').innerText = mSales + '개';
            document.getElementById('tAmount').innerText = tSettle.toLocaleString() + '원';
            document.getElementById('tCount').innerText = tSales + '개';
        }

        function renderTable(summary) {
            const body = document.getElementById('inventoryBody');
            body.innerHTML = '';
            let displayList = productOrder.filter(p => summary[p]);
            Object.keys(summary).forEach(p => { if(!displayList.includes(p)) displayList.push(p); });
            
            displayList.forEach(name => {
                const { supply, sales } = summary[name];
                const stock = supply - sales;
                const dotColor = productColors[name] || '#ccc';
                const tr = document.createElement('tr');
                tr.className = "border-b text-sm bg-white hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 text-left flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full" style="background-color: ${dotColor}"></div>
                        <span class="font-bold text-slate-700">${name}</span>
                    </td>
                    <td class="p-4 text-center text-blue-500 font-bold">${supply}</td>
                    <td class="p-4 text-center text-red-500 font-bold">${sales}</td>
                    <td class="p-4 text-center font-black ${stock < 0 ? 'text-red-600' : 'text-slate-900'}">${stock}</td>
                `;
                body.appendChild(tr);
            });
        }

        function renderHistory(filterMonth) {
            const histBody = document.getElementById('historyList');
            const [year, month] = filterMonth.split('-');
            document.getElementById('historyTitle').innerText = `📅 ${year}년 ${month}월 상세 내역`;
            histBody.innerHTML = '';
            const sortedRecords = Object.entries(allRecords)
                .filter(([_, rec]) => rec.date && rec.date.startsWith(filterMonth))
                .sort((a, b) => new Date(b[1].date) - new Date(a[1].date));

            sortedRecords.forEach(([id, rec]) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-4 bg-slate-50 rounded-2xl mb-2 text-[11px]";
                const detailInfo = Number(rec.settleAmount) > 0 
                    ? `<span class="text-amber-600 font-black">[정산] ${rec.settleAmount.toLocaleString()}원</span>`
                    : `<span class="text-blue-500 font-bold">납품:${rec.supplyCount}</span> / <span class="text-red-500 font-bold">판매:${rec.salesCount}</span>`;

                div.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-[9px] text-gray-400 mb-0.5">${rec.date}</span>
                        <div class="leading-tight"><span class="font-black text-slate-800">${rec.product}</span> | ${detailInfo}</div>
                    </div>
                    <button onclick="deleteRecord('${id}')" class="p-2 text-red-300">🗑️</button>`;
                histBody.appendChild(div);
            });
        }

        window.deleteRecord = (id) => { if (confirm("삭제할까요?")) remove(ref(db, `records/${id}`)); };

        function updateChart(chartData) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            const labels = Object.keys(chartData);
            const data = Object.values(chartData);
            const colors = labels.map(label => productColors[label] || '#eee');

            if (mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'doughnut',
                data: { 
                    labels: labels, 
                    datasets: [{ 
                        data: data, 
                        backgroundColor: colors, 
                        borderColor: '#ffffff',
                        borderWidth: 3
                    }] 
                },
                options: { 
                    plugins: { legend: { display: false } }, 
                    cutout: '75%', 
                    responsive: true, 
                    maintainAspectRatio: false 
                }
            });
        }

        window.magicInput = async () => {
            const text = prompt("데이터를 붙여넣으세요");
            if (!text) return;
            try {
                const data = JSON.parse(text);
                await set(ref(db, 'records'), null);
                for (const item of data) { await push(ref(db, 'records'), { ...item, timestamp: serverTimestamp() }); }
                alert("반영 완료!");
            } catch (e) { alert("형식 오류!"); }
        };

        window.saveData = (type) => {
            let data = { timestamp: serverTimestamp() };
            const prefix = type === 'basic' ? 'b' : 's';
            data.date = document.getElementById(`${prefix}Date`).value;
            data.product = document.getElementById(`${prefix}Prod`).value;
            if (type === 'basic') {
                data.supplyCount = Number(document.getElementById('bSupply').value) || 0;
                data.salesCount = Number(document.getElementById('bSales').value) || 0;
            } else {
                data.settleAmount = Number(document.getElementById('sTotal').value) || 0;
                data.salesCount = Number(document.getElementById('sQty').value) || 0;
            }
            if (!data.product || !data.date) return alert("날짜와 품목을 확인하세요!");
            push(ref(db, 'records'), data).then(() => { 
                document.getElementById('basicInput').classList.add('hidden');
                document.getElementById('settleInput').classList.add('hidden');
            });
        };

        window.onload = init;
    </script>
</head>
<body class="bg-slate-50 p-4 pb-40 font-sans tracking-tight text-slate-900">
    <div class="max-w-md mx-auto space-y-5">
        <header class="flex justify-between items-start py-4">
            <div><h1 class="text-2xl font-black">웃는 고양이 <span class="text-amber-500">×</span> 세발자전거</h1><p id="headerDate" class="text-xs font-bold text-slate-400 mt-1"></p></div>
            <div class="flex gap-2">
                <button onclick="magicInput()" class="bg-amber-100 text-amber-600 px-3 py-2 rounded-xl text-[10px] font-black shadow-sm">✨ 자동입력</button>
                <input type="month" id="monthFilter" class="bg-white border-none rounded-xl px-2 py-2 text-xs font-black shadow-sm">
            </div>
        </header>

        <!-- 대시보드 배경색 변경: 연한 오렌지 계열 -->
        <section class="bg-gradient-to-br from-orange-400 to-amber-500 rounded-[2.5rem] p-8 shadow-xl text-white space-y-8 relative overflow-hidden">
            <div class="relative z-10">
                <p id="settleTitle" class="text-[10px] font-black opacity-80 uppercase mb-1">정산액</p>
                <p id="mAmount" class="text-5xl font-black mb-1 leading-tight">0원</p>
                <p class="text-xs font-bold opacity-90"><span id="salesTitle">판매량</span>: <span id="mCount">0개</span></p>
            </div>
            <div class="flex items-center justify-between pt-6 border-t border-white/20 relative z-10">
                <div><p class="text-[10px] font-bold opacity-70">총 판매액 (전체)</p><p id="tAmount" class="text-lg font-black"></p></div>
                <div class="text-right"><p class="text-[10px] font-bold opacity-70">총 판매수 (전체)</p><p id="tCount" class="text-lg font-black"></p></div>
            </div>
            <div class="absolute -right-2 top-4 w-36 h-36 opacity-90"><canvas id="salesChart"></canvas></div>
        </section>

        <!-- 품목 리스트: 컬러 점 추가 -->
        <section class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-slate-100">
            <table class="w-full text-center">
                <thead class="bg-slate-50/50 text-[10px] font-black text-slate-400">
                    <tr><th class="p-4 text-left">품목</th><th>납품</th><th class="text-amber-600">판매</th><th>재고</th></tr>
                </thead>
                <tbody id="inventoryBody" class="divide-y divide-slate-50"></tbody>
            </table>
        </section>

        <section class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
            <h3 id="historyTitle" class="font-black text-[12px] mb-4 text-slate-400 tracking-widest uppercase">상세 내역</h3>
            <div id="historyList" class="max-h-80 overflow-y-auto pr-2"></div>
        </section>

        <div class="fixed bottom-8 left-4 right-4 max-w-md mx-auto grid grid-cols-2 gap-4 z-50">
            <button onclick="document.getElementById('basicInput').classList.toggle('hidden'); document.getElementById('settleInput').classList.add('hidden')" class="bg-slate-900 text-white p-5 rounded-[2rem] font-black shadow-2xl active:scale-95 transition-transform">📦 수량 기록</button>
            <button onclick="document.getElementById('settleInput').classList.toggle('hidden'); document.getElementById('basicInput').classList.add('hidden')" class="bg-amber-500 text-white p-5 rounded-[2rem] font-black shadow-2xl active:scale-95 transition-transform">💰 정산 기록</button>
        </div>

        <section id="basicInput" class="hidden bg-white p-8 rounded-[3rem] shadow-2xl space-y-4 mb-20">
            <h2 class="font-black text-lg">📦 수량 입력</h2>
            <input type="date" id="bDate" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold">
            <select id="bProd" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold">
                <option value="">제품 선택</option><option value="고양이 인형">고양이 인형</option><option value="고양이 키링">고양이 키링</option><option value="북커버">북커버</option><option value="양면 파우치">양면 파우치</option><option value="꽃수세미">꽃수세미</option><option value="크로스백">크로스백</option>
            </select>
            <div class="grid grid-cols-2 gap-3"><input type="number" id="bSupply" placeholder="납품(+)" class="p-4 bg-blue-50 text-blue-600 rounded-2xl border-none font-black text-center"><input type="number" id="bSales" placeholder="판매(-)" class="p-4 bg-red-50 text-red-600 rounded-2xl border-none font-black text-center"></div>
            <button onclick="saveData('basic')" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black">저장하기</button>
        </section>

        <section id="settleInput" class="hidden bg-white p-8 rounded-[3rem] shadow-2xl space-y-4 mb-20">
            <h2 class="font-black text-lg text-amber-600">💰 정산 입력</h2>
            <input type="date" id="sDate" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold">
            <input type="text" id="sProd" value="결제" readonly class="w-full p-4 bg-slate-100 rounded-2xl border-none font-bold text-gray-500">
            <div class="grid grid-cols-2 gap-2"><input type="number" id="sQty" placeholder="판매수량" class="p-4 bg-slate-50 rounded-xl font-bold"><input type="number" id="sTotal" placeholder="정산금액" class="p-4 bg-amber-50 text-amber-600 rounded-xl font-black"></div>
            <button onclick="saveData('settle')" class="w-full bg-amber-500 text-white p-5 rounded-2xl font-black">저장하기</button>
        </section>
    </div>
</body>
</html>

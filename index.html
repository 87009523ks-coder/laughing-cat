<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 × 세발자전거</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.app",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allRecords = {};
        let productOrder = [];
        let mainChart = null;
        let editingId = null;

        const colorPalette = ['#FFD93D', '#FF8B13', '#FF6B6B', '#4D96FF', '#6BCB77', '#9D72FF'];
        const productColors = {};

        function init() {
            const now = new Date();
            document.getElementById('headerDate').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
            const monthFilter = document.getElementById('monthFilter');
            monthFilter.value = now.toISOString().substring(0, 7);
            monthFilter.addEventListener('change', processData);

            onValue(ref(db, 'records'), (snapshot) => {
                allRecords = snapshot.val() || {};
                processData();
            });
            onValue(ref(db, 'settings/order'), (snapshot) => {
                productOrder = snapshot.val() || ["고양이 인형", "고양이 키링", "북커버", "양면 파우치", "꽃수세미", "크로스백"];
                productOrder.forEach((name, i) => { productColors[name] = colorPalette[i % colorPalette.length]; });
                processData();
            });
        }

        function processData() {
            const summary = {}; let mSettle = 0; let mSales = 0; let tSettle = 0; let tSales = 0;
            const filterMonth = document.getElementById('monthFilter').value;
            const monthlyChartData = {};

            Object.values(allRecords).forEach(rec => {
                let prod = rec.product || "미분류";
                if (prod === "결제") {
                    tSettle += Number(rec.settleAmount || 0);
                    if (rec.date?.startsWith(filterMonth)) mSettle += Number(rec.settleAmount || 0);
                    return;
                }
                if (!summary[prod]) summary[prod] = { supply: 0, sales: 0, details: [] };
                summary[prod].supply += Number(rec.supplyCount || 0);
                summary[prod].sales += Number(rec.salesCount || 0);
                tSales += Number(rec.salesCount || 0);
                if (rec.date?.startsWith(filterMonth)) {
                    mSales += Number(rec.salesCount || 0);
                    summary[prod].details.push(rec);
                    if (Number(rec.salesCount) > 0) monthlyChartData[prod] = (monthlyChartData[prod] || 0) + Number(rec.salesCount);
                }
            });

            renderStats(mSettle, mSales, tSettle, tSales);
            renderTable(summary);
            renderHistory(filterMonth);
            updateChart(monthlyChartData);
        }

        function renderStats(mSettle, mSales, tSettle, tSales) {
            document.getElementById('mAmount').innerText = mSettle.toLocaleString() + '원';
            document.getElementById('mCount').innerText = mSales + '개';
            document.getElementById('tAmount').innerText = tSettle.toLocaleString() + '원';
            document.getElementById('tCount').innerText = tSales + '개';
        }

        function renderTable(summary) {
            const body = document.getElementById('inventoryBody');
            body.innerHTML = '';
            let displayList = productOrder.filter(p => summary[p] || productOrder.includes(p));
            
            displayList.forEach(name => {
                const data = summary[name] || { supply: 0, sales: 0, details: [] };
                const stock = data.supply - data.sales;
                const dotColor = productColors[name] || '#ccc';
                
                const tr = document.createElement('tr');
                tr.setAttribute('data-id', name);
                tr.className = "border-b text-sm transition-all active:bg-slate-50 cursor-pointer";
                tr.innerHTML = `
                    <td class="p-4 text-gray-400 handle">≡</td>
                    <td class="p-4 text-left flex items-center gap-2 font-black text-slate-800" onclick="toggleDetail('${name}')">
                        <div class="w-2.5 h-2.5 rounded-full" style="background-color: ${dotColor}"></div>${name}
                    </td>
                    <td class="p-4 text-center text-blue-600 font-bold">${data.supply}</td>
                    <td class="p-4 text-center text-red-500 font-bold">${data.sales}</td>
                    <td class="p-4 text-center font-black ${stock < 0 ? 'text-red-600' : 'text-slate-900'}">${stock}</td>
                `;

                const detailTr = document.createElement('tr');
                detailTr.id = `detail-${name.replace(/\s+/g, '')}`;
                detailTr.className = "hidden bg-slate-50";
                const detailContent = data.details.length > 0 
                    ? data.details.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(d => 
                        `<div class="flex justify-between py-1 border-b border-white text-[10px] px-4 font-bold">
                            <span class="text-gray-400">${d.date}</span>
                            <span>납품:${d.supplyCount} / 판매:${d.salesCount}</span>
                         </div>`).join('')
                    : `<div class="text-center py-2 text-gray-400 text-[10px]">기록 없음</div>`;
                
                detailTr.innerHTML = `<td colspan="5" class="p-0"><div class="overflow-hidden transition-all">${detailContent}</div></td>`;

                body.appendChild(tr);
                body.appendChild(detailTr);
            });
            
            new Sortable(body, { handle: '.handle', animation: 150, onEnd: () => {
                const newOrder = Array.from(body.querySelectorAll('tr[data-id]')).map(tr => tr.getAttribute('data-id'));
                set(ref(db, 'settings/order'), newOrder);
            }});
        }

        window.toggleDetail = (name) => {
            const el = document.getElementById(`detail-${name.replace(/\s+/g, '')}`);
            el.classList.toggle('hidden');
        };

        function renderHistory(filterMonth) {
            const histBody = document.getElementById('historyList');
            histBody.innerHTML = '';
            const sortedRecords = Object.entries(allRecords)
                .filter(([_, rec]) => rec.date?.startsWith(filterMonth))
                .sort((a, b) => new Date(b[1].date) - new Date(a[1].date));

            sortedRecords.forEach(([id, rec]) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-4 bg-white rounded-2xl mb-2 text-[11px] shadow-sm cursor-pointer active:bg-slate-100";
                div.onclick = () => startEdit(id, rec);
                const detailInfo = Number(rec.settleAmount) > 0 
                    ? `<span class="text-amber-700 font-black">[정산] ${rec.settleAmount.toLocaleString()}원</span>`
                    : `<span class="text-blue-600 font-bold">납품:${rec.supplyCount}</span> / <span class="text-red-500 font-bold">판매:${rec.salesCount}</span>`;
                div.innerHTML = `<div class="flex flex-col"><span class="text-[9px] text-gray-400 mb-0.5">${rec.date}</span><div class="leading-tight"><span class="font-black text-slate-800">${rec.product}</span> | ${detailInfo}</div></div><button onclick="event.stopPropagation(); deleteRecord('${id}')" class="p-2 text-red-200 hover:text-red-500">🗑️</button>`;
                histBody.appendChild(div);
            });
        }

        window.openInput = (type) => {
            editingId = null;
            closeInputs();
            document.getElementById(type === 'basic' ? 'basicInput' : 'settleInput').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };

        window.startEdit = (id, rec) => {
            editingId = id;
            closeInputs();
            if (rec.product === "결제") {
                document.getElementById('settleInput').classList.remove('hidden');
                document.getElementById('sDate').value = rec.date;
                document.getElementById('sQty').value = rec.salesCount;
                document.getElementById('sTotal').value = rec.settleAmount;
            } else {
                document.getElementById('basicInput').classList.remove('hidden');
                document.getElementById('bDate').value = rec.date;
                const select = document.getElementById('bProd');
                if (Array.from(select.options).some(o => o.value === rec.product)) {
                    select.value = rec.product;
                } else {
                    select.value = '직접입력';
                    document.getElementById('bProdDirect').classList.remove('hidden');
                    document.getElementById('bProdDirect').value = rec.product;
                }
                document.getElementById('bSupply').value = rec.supplyCount;
                document.getElementById('bSales').value = rec.salesCount;
            }
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };

        window.saveData = (type) => {
            let data = { timestamp: serverTimestamp() };
            const prefix = type === 'basic' ? 'b' : 's';
            data.date = document.getElementById(`${prefix}Date`).value;
            if (type === 'basic') {
                const selectVal = document.getElementById('bProd').value;
                data.product = selectVal === '직접입력' ? document.getElementById('bProdDirect').value : selectVal;
                data.supplyCount = Number(document.getElementById('bSupply').value) || 0;
                data.salesCount = Number(document.getElementById('bSales').value) || 0;
            } else {
                data.product = "결제";
                data.settleAmount = Number(document.getElementById('sTotal').value) || 0;
                data.salesCount = Number(document.getElementById('sQty').value) || 0;
            }
            if (!data.product || !data.date) return alert("항목을 채워주세요!");
            const action = editingId ? update(ref(db, `records/${editingId}`), data) : push(ref(db, 'records'), data);
            action.then(() => { closeInputs(); });
        };

        window.closeInputs = () => {
            document.getElementById('basicInput').classList.add('hidden');
            document.getElementById('settleInput').classList.add('hidden');
            document.querySelectorAll('input').forEach(i => { if(i.type === 'number' || i.type === 'text') i.value = ''; });
            document.getElementById('bProd').value = '';
            document.getElementById('bProdDirect').classList.add('hidden');
        };

        window.deleteRecord = (id) => { if (confirm("삭제하시겠습니까?")) remove(ref(db, `records/${id}`)); };

        function updateChart(chartData) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            const labels = Object.keys(chartData);
            if (mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: Object.values(chartData), backgroundColor: labels.map(l => productColors[l] || '#eee'), borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '70%', responsive: true, maintainAspectRatio: false }
            });
        }

        window.onload = init;
    </script>
</head>
<body class="bg-slate-50 p-4 pb-48 font-sans tracking-tight text-slate-900">
    <div class="max-w-md mx-auto space-y-6">
        <header class="flex justify-between items-start py-4">
            <div><h1 class="text-2xl font-black">웃는 고양이 <span class="text-orange-500">×</span> 세발자전거</h1><p id="headerDate" class="text-xs font-bold text-slate-400 mt-1"></p></div>
            <input type="month" id="monthFilter" class="bg-white border-none rounded-xl px-2 py-2 text-xs font-black shadow-sm">
        </header>

        <section class="bg-gradient-to-br from-orange-400 to-amber-500 rounded-[2.5rem] p-8 shadow-xl text-white space-y-8 relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-[10px] font-black opacity-80 uppercase mb-1">월 정산액</p>
                <p id="mAmount" class="text-5xl font-black mb-1 leading-tight">0원</p>
                <div class="flex gap-4 pt-4 border-t border-white/20 mt-4 font-bold text-xs opacity-90">
                    <p>월 판매: <span id="mCount">0개</span></p>
                    <p>전체 정산: <span id="tAmount">0원</span></p>
                </div>
            </div>
            <div class="absolute -right-4 -top-4 w-36 h-36 opacity-30"><canvas id="salesChart"></canvas></div>
        </section>

        <section class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-slate-100">
            <table class="w-full">
                <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                    <tr><th class="p-4 w-8"></th><th class="text-left">품목 (클릭 시 상세)</th><th>납품</th><th>판매</th><th>재고</th></tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </section>

        <section class="bg-slate-100/50 p-6 rounded-[2.5rem] border border-slate-200">
            <h3 class="font-black text-[12px] mb-4 text-slate-400 tracking-widest uppercase text-center">최근 내역 (수정 시 클릭)</h3>
            <div id="historyList"></div>
        </section>

        <div class="fixed bottom-8 left-4 right-4 max-w-md mx-auto grid grid-cols-2 gap-4 z-[100]">
            <button onclick="openInput('basic')" class="bg-slate-900 text-white p-5 rounded-[2rem] font-black shadow-2xl active:scale-95 transition-all">📦 수량 기록</button>
            <button onclick="openInput('settle')" class="bg-amber-500 text-white p-5 rounded-[2rem] font-black shadow-2xl active:scale-95 transition-all">💰 정산 기록</button>
        </div>

        <section id="basicInput" class="hidden bg-white p-8 rounded-[3rem] shadow-2xl space-y-4 mb-20 border-4 border-slate-900">
            <div class="flex justify-between"><h2 class="font-black text-lg">📦 수량 기록/수정</h2><button onclick="closeInputs()">닫기</button></div>
            <input type="date" id="bDate" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold">
            <select id="bProd" onchange="this.value==='직접입력'?document.getElementById('bProdDirect').classList.remove('hidden'):document.getElementById('bProdDirect').classList.add('hidden')" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm">
                <option value="">제품 선택</option>
                <option value="고양이 인형">고양이 인형</option><option value="고양이 키링">고양이 키링</option><option value="북커버">북커버</option><option value="양면 파우치">양면 파우치</option><option value="꽃수세미">꽃수세미</option><option value="크로스백">크로스백</option><option value="직접입력">[직접입력]</option>
            </select>
            <input type="text" id="bProdDirect" placeholder="제품명 직접 입력" class="hidden w-full p-4 bg-orange-50 border-2 border-orange-200 rounded-2xl font-bold">
            <div class="grid grid-cols-2 gap-3">
                <div class="text-center"><p class="text-[10px] font-bold text-blue-500 mb-1">납품(+)</p><input type="number" id="bSupply" class="w-full p-4 bg-blue-50 rounded-2xl font-black text-blue-600 text-center"></div>
                <div class="text-center"><p class="text-[10px] font-bold text-red-500 mb-1">판매(-)</p><input type="number" id="bSales" class="w-full p-4 bg-red-50 rounded-2xl font-black text-red-600 text-center"></div>
            </div>
            <button onclick="saveData('basic')" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black">저장하기</button>
        </section>

        <section id="settleInput" class="hidden bg-white p-8 rounded-[3rem] shadow-2xl space-y-4 mb-20 border-4 border-amber-500">
            <div class="flex justify-between"><h2 class="font-black text-lg text-amber-600">💰 정산 기록/수정</h2><button onclick="closeInputs()">닫기</button></div>
            <input type="date" id="sDate" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold">
            <div class="grid grid-cols-2 gap-3">
                <div><p class="text-[10px] font-bold text-slate-400 mb-1">판매 수량</p><input type="number" id="sQty" class="w-full p-4 bg-slate-50 rounded-2xl font-bold"></div>
                <div><p class="text-[10px] font-bold text-amber-600 mb-1">정산 금액</p><input type="number" id="sTotal" class="w-full p-4 bg-amber-50 rounded-2xl font-black text-amber-600"></div>
            </div>
            <button onclick="saveData('settle')" class="w-full bg-amber-500 text-white p-5 rounded-2xl font-black">정산 완료</button>
        </section>
    </div>
</body>
</html>

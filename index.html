<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 관리자 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.com",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            measurementId: "G-TRXM2NZ5FF",
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allRecords = {};

        function init() {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('headerDate').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일(${days[now.getDay()]})`;
            document.querySelectorAll('input[type="date"]').forEach(el => el.valueAsDate = now);
        }

        onValue(ref(db, 'records'), (snapshot) => {
            allRecords = snapshot.val() || {};
            const summary = {};
            Object.values(allRecords).forEach(rec => {
                if (!summary[rec.product]) summary[rec.product] = { supply: 0, sales: 0 };
                summary[rec.product].supply += Number(rec.supplyCount || 0);
                summary[rec.product].sales += Number(rec.salesCount || 0);
            });
            renderTable(summary);
        });

        function renderTable(summary) {
            const body = document.getElementById('inventoryBody');
            body.innerHTML = '';
            const defaults = ["인형", "인형 걸이", "키링", "북커버", "파우치"];
            const products = Array.from(new Set([...defaults, ...Object.keys(summary)]));

            products.forEach(name => {
                const { supply, sales } = summary[name] || { supply: 0, sales: 0 };
                const stock = supply - sales;
                const tr = document.createElement('tr');
                tr.className = "border-b text-sm cursor-pointer hover:bg-orange-50 active:bg-orange-100 transition-colors";
                tr.onclick = () => showDetails('product', name);
                tr.innerHTML = `
                    <td class="p-4 font-medium">${name}</td>
                    <td class="p-4 text-center text-blue-500">${supply}</td>
                    <td class="p-4 text-center text-red-500">${sales}</td>
                    <td class="p-4 text-center font-black text-gray-800">${stock}</td>
                `;
                body.appendChild(tr);
            });
        }

        window.showDetails = (mode, value) => {
            const detailSection = document.getElementById('detailSection');
            const detailTitle = document.getElementById('detailTitle');
            const detailList = document.getElementById('detailList');
            
            detailSection.classList.remove('hidden');
            detailTitle.innerText = mode === 'product' ? `[${value}] 상세 기록` : `📅 ${value} 기록 현황`;
            detailList.innerHTML = '';

            let filtered = Object.entries(allRecords);
            if (mode === 'product') {
                filtered = filtered.filter(([id, rec]) => rec.product === value);
            } else if (mode === 'date') {
                filtered = filtered.filter(([id, rec]) => rec.date === value);
            }

            filtered.sort((a, b) => new Date(b[1].date) - new Date(a[1].date));

            if (filtered.length === 0) {
                detailList.innerHTML = '<p class="text-center py-10 text-gray-400">조회된 기록이 없습니다.</p>';
            } else {
                filtered.forEach(([id, rec]) => {
                    const div = document.createElement('div');
                    div.className = "bg-gray-50 p-4 rounded-2xl space-y-2 border border-gray-100 mb-3";
                    div.innerHTML = `
                        <div class="flex justify-between items-start">
                            <span class="text-xs font-bold text-orange-400">${mode === 'product' ? rec.date : rec.product}</span>
                            <button onclick="deleteRecord('${id}')" class="text-[10px] text-red-400 border border-red-100 px-2 py-1 rounded-md">삭제</button>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <div><label class="text-[10px] text-gray-400">납품</label><input type="number" value="${rec.supplyCount || 0}" onchange="updateValue('${id}', 'supplyCount', this.value)" class="w-full p-2 bg-white rounded-lg border-none text-sm text-blue-600 font-bold"></div>
                            <div><label class="text-[10px] text-gray-400">판매</label><input type="number" value="${rec.salesCount || 0}" onchange="updateValue('${id}', 'salesCount', this.value)" class="w-full p-2 bg-white rounded-lg border-none text-sm text-red-600 font-bold"></div>
                        </div>
                    `;
                    detailList.appendChild(div);
                });
            }
            detailSection.scrollIntoView({ behavior: 'smooth' });
        };

        window.updateValue = (id, field, value) => {
            update(ref(db, `records/${id}`), { [field]: Number(value) });
        };

        window.deleteRecord = (id) => {
            if (confirm("정말 이 기록을 삭제하시겠습니까?")) {
                remove(ref(db, `records/${id}`));
                alert("삭제되었습니다.");
            }
        };

        window.openCalendar = () => {
            const picker = document.getElementById('historyDatePicker');
            picker.classList.toggle('hidden');
        };

        window.saveData = (type) => {
            let product, supply = 0, sales = 0, price = 0, settle = 0, date;
            if (type === 'basic') {
                date = document.getElementById('bDate').value;
                product = document.getElementById('bProd').value === '기타' ? document.getElementById('bEtc').value : document.getElementById('bProd').value;
                supply = Number(document.getElementById('bSupply').value) || 0;
                sales = Number(document.getElementById('bSales').value) || 0;
            } else {
                date = document.getElementById('sDate').value;
                product = document.getElementById('sProd').value === '기타' ? document.getElementById('sEtc').value : document.getElementById('sProd').value;
                price = Number(document.getElementById('sPrice').value) || 0;
                settle = Number(document.getElementById('sTotal').value) || 0;
                sales = Number(document.getElementById('sQty').value) || 0;
            }
            if (!product) return alert("제품명을 확인하세요.");
            push(ref(db, 'records'), {
                date, product, supplyCount: supply, salesCount: sales, price, settleAmount: settle, timestamp: serverTimestamp()
            }).then(() => {
                alert("저장되었습니다.");
                document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
            });
        };

        window.toggleEtc = (selectId, etcId) => {
            const val = document.getElementById(selectId).value;
            document.getElementById(etcId).classList.toggle('hidden', val !== '기타');
        };

        window.calcSettle = (base) => {
            const price = Number(document.getElementById('sPrice').value) || 0;
            const rate = Number(document.getElementById('sRate').value) || 0;
            const total = Number(document.getElementById('sTotal').value) || 0;
            if (base === 'rate' && price) document.getElementById('sTotal').value = Math.round(price * (rate / 100));
            else if (base === 'total' && price) document.getElementById('sRate').value = ((total / price) * 100).toFixed(1);
        };

        window.onload = init;
    </script>
</head>
<body class="bg-gray-100 p-4 pb-20">
    <div class="max-w-md mx-auto space-y-4">
        <!-- 헤더 및 날짜 조회 -->
        <header class="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm">
            <h1 class="text-xl font-black text-orange-500 tracking-tighter">웃는 고양이</h1>
            <div class="relative text-right">
                <button onclick="openCalendar()" id="headerDate" class="text-xs font-bold text-gray-500 bg-gray-50 px-4 py-2 rounded-full border border-gray-100 hover:bg-orange-50 active:scale-95 transition-all"></button>
                
                <!-- 날짜 선택기 팝업 -->
                <div id="historyDatePicker" class="hidden mt-2 p-4 bg-white rounded-3xl shadow-2xl border border-orange-200 absolute right-0 z-20 w-64">
                    <p class="text-xs font-black text-gray-800 mb-3 text-left">📅 기록 날짜 찾기</p>
                    <!-- 날짜 입력 필드 (2025년 등 연도 선택이 자유로운 표준 타입) -->
                    <input type="date" 
                           id="jumpDate"
                           min="2020-01-01" 
                           max="2030-12-31"
                           onchange="showDetails('date', this.value); document.getElementById('historyDatePicker').classList.add('hidden')" 
                           class="w-full p-3 text-sm font-bold border-2 border-orange-100 bg-orange-50 rounded-xl focus:outline-none focus:border-orange-400 transition-colors">
                    <p class="text-[10px] text-gray-400 mt-2 text-left leading-tight">* 연도 부분을 누르면 2025년으로 빠르게 이동할 수 있습니다.</p>
                </div>
            </div>
        </header>

        <!-- 재고 현황판 -->
        <section class="bg-white rounded-3xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-[10px] text-gray-400 uppercase tracking-widest">
                    <tr><th class="p-4">제품명</th><th class="p-4 text-center">납품</th><th class="p-4 text-center">판매</th><th class="p-4 text-center text-orange-500">재고</th></tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </section>

        <!-- 상세 조회/수정 섹션 -->
        <section id="detailSection" class="hidden bg-white p-6 rounded-3xl shadow-2xl border-2 border-orange-400 space-y-4">
            <div class="flex justify-between items-center">
                <h3 id="detailTitle" class="font-black text-gray-800"></h3>
                <button onclick="document.getElementById('detailSection').classList.add('hidden')" class="text-gray-400 text-xl">&times;</button>
            </div>
            <div id="detailList" class="max-h-80 overflow-y-auto space-y-3 pr-1"></div>
        </section>

        <!-- 하단 입력 메뉴 -->
        <div class="grid grid-cols-2 gap-3">
            <button onclick="document.getElementById('basicInput').classList.toggle('hidden'); document.getElementById('settleInput').classList.add('hidden')" class="bg-gray-800 text-white p-4 rounded-2xl font-bold text-sm shadow-lg">📦 수량 기록</button>
            <button onclick="document.getElementById('settleInput').classList.toggle('hidden'); document.getElementById('basicInput').classList.add('hidden')" class="bg-orange-500 text-white p-4 rounded-2xl font-bold text-sm shadow-lg">💰 정산 기록</button>
        </div>

        <!-- 수량 입력 -->
        <section id="basicInput" class="hidden bg-white p-6 rounded-3xl shadow-xl space-y-3 border-2 border-gray-800">
            <input type="date" id="bDate" class="w-full p-4 bg-gray-50 rounded-xl border-none">
            <select id="bProd" onchange="toggleEtc('bProd', 'bEtc')" class="w-full p-4 bg-gray-50 rounded-xl border-none"><option value="인형">인형</option><option value="인형 걸이">인형 걸이</option><option value="키링">키링</option><option value="북커버">북커버</option><option value="파우치">파우치</option><option value="기타">기타 직접입력</option></select>
            <input type="text" id="bEtc" placeholder="제품명 입력" class="hidden w-full p-4 bg-orange-50 rounded-xl border-none ring-1 ring-orange-200">
            <div class="grid grid-cols-2 gap-2"><input type="number" id="bSupply" placeholder="납품수량" class="p-4 bg-gray-50 rounded-xl border-none text-blue-600 font-bold"><input type="number" id="bSales" placeholder="판매수량" class="p-4 bg-gray-50 rounded-xl border-none text-red-600 font-bold"></div>
            <button onclick="saveData('basic')" class="w-full bg-gray-800 text-white p-4 rounded-xl font-bold">기록 저장</button>
        </section>

        <!-- 정산 입력 -->
        <section id="settleInput" class="hidden bg-white p-6 rounded-3xl shadow-xl space-y-3 border-2 border-orange-500">
            <input type="date" id="sDate" class="w-full p-4 bg-gray-50 rounded-xl border-none">
            <select id="sProd" onchange="toggleEtc('sProd', 'sEtc')" class="w-full p-4 bg-gray-50 rounded-xl border-none"><option value="인형">인형</option><option value="인형 걸이">인형 걸이</option><option value="키링">키링</option><option value="북커버">북커버</option><option value="파우치">파우치</option><option value="기타">기타 직접입력</option></select>
            <input type="text" id="sEtc" placeholder="제품명 입력" class="hidden w-full p-4 bg-orange-50 rounded-xl border-none ring-1 ring-orange-200">
            <div class="grid grid-cols-2 gap-2"><input type="number" id="sPrice" oninput="calcSettle('rate')" placeholder="단가" class="p-4 bg-gray-50 rounded-xl border-none"><input type="number" id="sQty" placeholder="판매갯수" class="p-4 bg-gray-50 rounded-xl border-none font-bold text-orange-500"></div>
            <div class="grid grid-cols-2 gap-2"><input type="number" id="sRate" oninput="calcSettle('rate')" placeholder="정산 %" class="p-4 bg-blue-50 rounded-xl border-none text-blue-600 font-bold"><input type="number" id="sTotal" oninput="calcSettle('total')" placeholder="정산금액" class="p-4 bg-green-50 rounded-xl border-none text-green-600 font-bold"></div>
            <button onclick="saveData('settle')" class="w-full bg-orange-500 text-white p-4 rounded-xl font-bold">정산 데이터 저장</button>
        </section>
    </div>
</body>
</html>

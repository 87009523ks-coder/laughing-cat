<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 × 세발자전거</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.app",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allRecords = {};
        let productOrder = [];
        let mainChart = null;
        let editingId = null;

        const colorPalette = ['#FFD93D', '#FF8B13', '#FF6B6B', '#4D96FF', '#6BCB77', '#9D72FF'];
        const productColors = {};

        function init() {
            const now = new Date();
            document.getElementById('headerDate').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
            const monthFilter = document.getElementById('monthFilter');
            monthFilter.value = now.toISOString().substring(0, 7);
            monthFilter.addEventListener('change', processData);

            onValue(ref(db, 'records'), (snapshot) => {
                allRecords = snapshot.val() || {};
                processData();
            });
            onValue(ref(db, 'settings/order'), (snapshot) => {
                productOrder = snapshot.val() || ["고양이 인형", "고양이 키링", "북커버", "양면 파우치", "꽃수세미", "크로스백"];
                productOrder.forEach((name, i) => { productColors[name] = colorPalette[i % colorPalette.length]; });
                processData();
            });
        }

        function processData() {
            const summary = {}; let mSettle = 0; let mSales = 0; let tSettle = 0; let tSales = 0;
            const filterMonth = document.getElementById('monthFilter').value;
            const monthlyChartData = {};

            Object.values(allRecords).forEach(rec => {
                let prod = rec.product || "미분류";
                if (prod === "결제") {
                    tSettle += Number(rec.settleAmount || 0);
                    if (rec.date?.startsWith(filterMonth)) mSettle += Number(rec.settleAmount || 0);
                    return;
                }
                if (!summary[prod]) summary[prod] = { supply: 0, sales: 0, details: [] };
                summary[prod].supply += Number(rec.supplyCount || 0);
                summary[prod].sales += Number(rec.salesCount || 0);
                tSales += Number(rec.salesCount || 0);
                if (rec.date?.startsWith(filterMonth)) {
                    mSales += Number(rec.salesCount || 0);
                    summary[prod].details.push(rec);
                    if (Number(rec.salesCount) > 0) monthlyChartData[prod] = (monthlyChartData[prod] || 0) + Number(rec.salesCount);
                }
            });

            renderStats(mSettle, mSales, tSettle, tSales);
            renderCards(summary);
            renderHistory(filterMonth);
            updateChart(monthlyChartData);
        }

        function renderStats(mSettle, mSales, tSettle, tSales) {
            document.getElementById('mAmount').innerText = mSettle.toLocaleString() + '원';
            document.getElementById('mCount').innerText = mSales + '개';
            document.getElementById('tAmount').innerText = tSettle.toLocaleString() + '원';
            document.getElementById('tCount').innerText = tSales + '개';
        }

        function renderCards(summary) {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            let displayList = productOrder.filter(p => summary[p] || productOrder.includes(p));
            
            displayList.forEach(name => {
                const data = summary[name] || { supply: 0, sales: 0, details: [] };
                const stock = data.supply - data.sales;
                const dotColor = productColors[name] || '#ccc';
                
                const card = document.createElement('div');
                card.setAttribute('data-id', name);
                card.className = "bg-white/70 backdrop-blur-md rounded-[1.5rem] p-4 shadow-sm border border-white/50 mb-3 transition-all";
                
                const detailContent = data.details.length > 0 
                    ? data.details.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(d => 
                        `<div class="flex justify-between py-2 border-b border-black/5 text-[10px] font-bold px-2">
                            <span class="text-slate-400">${d.date}</span>
                            <span class="text-slate-600">납품 <span class="text-blue-500">${d.supplyCount}</span> / 판매 <span class="text-red-500">${d.salesCount}</span></span>
                         </div>`).join('')
                    : `<div class="text-center py-4 text-slate-300 text-[10px]">기록이 없습니다.</div>`;

                card.innerHTML = `
                    <div class="flex justify-between items-center cursor-pointer" onclick="toggleDetail('${name}')">
                        <div class="flex items-center gap-3">
                            <div class="handle text-slate-300 text-lg">≡</div>
                            <div class="w-2.5 h-2.5 rounded-full" style="background-color: ${dotColor}"></div>
                            <span class="font-black text-slate-800 text-sm">${name}</span>
                        </div>
                        <div class="flex gap-4 text-xs font-black pr-2">
                            <div class="text-center"><p class="text-[8px] text-slate-300">납품</p><p class="text-blue-500">${data.supply}</p></div>
                            <div class="text-center"><p class="text-[8px] text-slate-300">판매</p><p class="text-red-500">${data.sales}</p></div>
                            <div class="text-center"><p class="text-[8px] text-slate-300">재고</p><p class="${stock < 0 ? 'text-red-600' : 'text-slate-900'}">${stock}</p></div>
                        </div>
                    </div>
                    <div id="detail-${name.replace(/\s+/g, '')}" class="hidden mt-3 pt-2 bg-black/5 rounded-xl overflow-hidden animate-in fade-in slide-in-from-top-1 duration-200">
                        ${detailContent}
                    </div>
                `;
                container.appendChild(card);
            });
            
            new Sortable(container, { 
                handle: '.handle', 
                animation: 200, 
                ghostClass: 'opacity-50',
                onEnd: () => {
                    const newOrder = Array.from(container.querySelectorAll('div[data-id]')).map(div => div.getAttribute('data-id'));
                    set(ref(db, 'settings/order'), newOrder);
                }
            });
        }

        window.toggleDetail = (name) => {
            const el = document.getElementById(`detail-${name.replace(/\s+/g, '')}`);
            el.classList.toggle('hidden');
        };

        function renderHistory(filterMonth) {
            const histBody = document.getElementById('historyList');
            histBody.innerHTML = '';
            const sortedRecords = Object.entries(allRecords)
                .filter(([_, rec]) => rec.date?.startsWith(filterMonth))
                .sort((a, b) => new Date(b[1].date) - new Date(a[1].date));

            sortedRecords.forEach(([id, rec]) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-3 bg-white/40 rounded-xl mb-2 text-[11px] cursor-pointer active:bg-white/80 transition-all border border-white/20";
                div.onclick = () => startEdit(id, rec);
                const detailInfo = Number(rec.settleAmount) > 0 
                    ? `<span class="text-amber-600 font-black">[정산] ${rec.settleAmount.toLocaleString()}원</span>`
                    : `<span class="text-blue-500 font-bold">납품:${rec.supplyCount}</span> / <span class="text-red-400 font-bold">판매:${rec.salesCount}</span>`;
                div.innerHTML = `<div class="flex flex-col"><span class="text-[9px] text-slate-400 font-bold">${rec.date}</span><div class="leading-tight"><span class="font-black text-slate-800">${rec.product}</span> | ${detailInfo}</div></div><button onclick="event.stopPropagation(); deleteRecord('${id}')" class="p-2 text-slate-300">🗑️</button>`;
                histBody.appendChild(div);
            });
        }

        window.openInput = (type) => {
            editingId = null;
            closeInputs();
            document.getElementById(type === 'basic' ? 'basicInput' : 'settleInput').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };

        window.startEdit = (id, rec) => {
            editingId = id;
            closeInputs();
            if (rec.product === "결제") {
                document.getElementById('settleInput').classList.remove('hidden');
                document.getElementById('sDate').value = rec.date;
                document.getElementById('sQty').value = rec.salesCount;
                document.getElementById('sTotal').value = rec.settleAmount;
            } else {
                document.getElementById('basicInput').classList.remove('hidden');
                document.getElementById('bDate').value = rec.date;
                const select = document.getElementById('bProd');
                if (Array.from(select.options).some(o => o.value === rec.product)) {
                    select.value = rec.product;
                } else {
                    select.value = '직접입력';
                    document.getElementById('bProdDirect').classList.remove('hidden');
                    document.getElementById('bProdDirect').value = rec.product;
                }
                document.getElementById('bSupply').value = rec.supplyCount;
                document.getElementById('bSales').value = rec.salesCount;
            }
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };

        window.saveData = (type) => {
            let data = { timestamp: serverTimestamp() };
            const prefix = type === 'basic' ? 'b' : 's';
            data.date = document.getElementById(`${prefix}Date`).value;
            if (type === 'basic') {
                const selectVal = document.getElementById('bProd').value;
                data.product = selectVal === '직접입력' ? document.getElementById('bProdDirect').value : selectVal;
                data.supplyCount = Number(document.getElementById('bSupply').value) || 0;
                data.salesCount = Number(document.getElementById('bSales').value) || 0;
            } else {
                data.product = "결제";
                data.settleAmount = Number(document.getElementById('sTotal').value) || 0;
                data.salesCount = Number(document.getElementById('sQty').value) || 0;
            }
            if (!data.product || !data.date) return alert("항목을 채워주세요!");
            const action = editingId ? update(ref(db, `records/${editingId}`), data) : push(ref(db, 'records'), data);
            action.then(() => { closeInputs(); });
        };

        window.closeInputs = () => {
            document.getElementById('basicInput').classList.add('hidden');
            document.getElementById('settleInput').classList.add('hidden');
            document.querySelectorAll('input').forEach(i => { if(i.type === 'number' || i.type === 'text') i.value = ''; });
            document.getElementById('bProd').value = '';
            document.getElementById('bProdDirect').classList.add('hidden');
        };

        window.deleteRecord = (id) => { if (confirm("삭제하시겠습니까?")) remove(ref(db, `records/${id}`)); };

        function updateChart(chartData) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            const labels = Object.keys(chartData);
            if (mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: Object.values(chartData), backgroundColor: labels.map(l => productColors[l] || '#eee'), borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '75%', responsive: true, maintainAspectRatio: false }
            });
        }

        window.onload = init;
    </script>
    <style>
        .handle { cursor: grab; }
        .handle:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-slate-50 p-4 pb-48 font-sans tracking-tight text-slate-900 overflow-x-hidden">
    <div class="max-w-md mx-auto space-y-6">
        <header class="flex justify-between items-center py-2">
            <div><h1 class="text-xl font-black">웃는 고양이 <span class="text-orange-500">×</span> 세발자전거</h1><p id="headerDate" class="text-[10px] font-bold text-slate-400 mt-0.5"></p></div>
            <input type="month" id="monthFilter" class="bg-white border-none rounded-xl px-2 py-2 text-[11px] font-black shadow-sm">
        </header>

        <section class="bg-gradient-to-br from-orange-400 to-amber-500 rounded-[2rem] p-6 shadow-xl text-white relative overflow-hidden h-48 flex flex-col justify-between">
            <div class="relative z-10">
                <p class="text-[9px] font-black opacity-80 uppercase tracking-widest">이번 달 현황 (MONTHLY)</p>
                <p id="mAmount" class="text-4xl font-black mt-1">0원</p>
                <p class="text-[9px] font-black opacity-80 uppercase tracking-widest mt-4">누적 총 실적 (TOTAL)</p>
                <p id="tAmount" class="text-lg font-black opacity-90">0원</p>
            </div>
            <div class="absolute -right-2 top-1/2 -translate-y-1/2 w-32 h-32 opacity-40 z-0"><canvas id="salesChart"></canvas></div>
            <div class="relative z-10 flex gap-4 text-[10px] font-bold opacity-80">
                <p>월 판매: <span id="mCount">0개</span></p>
                <p>전체 판매: <span id="tCount">0개</span></p>
            </div>
        </section>

        <!-- 품목 카드 리스트 -->
        <div id="cardContainer" class="space-y-3 px-1"></div>

        <section class="bg-slate-200/30 p-5 rounded-[2rem] border border-white/50 backdrop-blur-sm">
            <h3 class="font-black text-[9px] mb-4 text-slate-400 tracking-[0.2em] uppercase text-center">최근 활동 내역</h3>
            <div id="historyList"></div>
        </section>

        <div class="fixed bottom-8 left-4 right-4 max-w-md mx-auto grid grid-cols-2 gap-4 z-[100]">
            <button onclick="openInput('basic')" class="bg-slate-900 text-white p-5 rounded-[1.8rem] font-black shadow-2xl active:scale-95 transition-all text-sm flex items-center justify-center gap-2">📦 수량 기록</button>
            <button onclick="openInput('settle')" class="bg-orange-500 text-white p-5 rounded-[1.8rem] font-black shadow-2xl active:scale-95 transition-all text-sm flex items-center justify-center gap-2">💰 정산 기록</button>
        </div>

        <!-- 기록/수정 팝업 -->
        <section id="basicInput" class="hidden fixed inset-x-4 bottom-24 bg-white p-8 rounded-[2.5rem] shadow-[0_-20px_50px_rgba(0,0,0,0.1)] space-y-4 z-[101] border border-slate-100">
            <div class="flex justify-between items-center"><h2 class="font-black text-lg">기록 업데이트</h2><button onclick="closeInputs()" class="text-slate-300">✕</button></div>
            <input type="date" id="bDate" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm">
            <select id="bProd" onchange="this.value==='직접입력'?document.getElementById('bProdDirect').classList.remove('hidden'):document.getElementById('bProdDirect').classList.add('hidden')" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm">
                <option value="">품목 선택</option>
                <option value="고양이 인형">고양이 인형</option><option value="고양이 키링">고양이 키링</option><option value="북커버">북커버</option><option value="양면 파우치">양면 파우치</option><option value="꽃수세미">꽃수세미</option><option value="크로스백">크로스백</option><option value="직접입력">[직접입력]</option>
            </select>
            <input type="text" id="bProdDirect" placeholder="제품명 입력" class="hidden w-full p-4 bg-orange-50 border border-orange-200 rounded-2xl font-bold text-sm">
            <div class="grid grid-cols-2 gap-3">
                <div><p class="text-[9px] font-black text-blue-500 mb-1 ml-2">납품 수량</p><input type="number" id="bSupply" class="w-full p-4 bg-blue-50 rounded-2xl font-black text-blue-600 text-center"></div>
                <div><p class="text-[9px] font-black text-red-500 mb-1 ml-2">판매 수량</p><input type="number" id="bSales" class="w-full p-4 bg-red-50 rounded-2xl font-black text-red-600 text-center"></div>
            </div>
            <button onclick="saveData('basic')" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black mt-2 transition-all active:bg-black">저장 완료</button>
        </section>

        <section id="settleInput" class="hidden fixed inset-x-4 bottom-24 bg-white p-8 rounded-[2.5rem] shadow-[0_-20px_50px_rgba(0,0,0,0.1)] space-y-4 z-[101] border border-slate-100">
            <div class="flex justify-between items-center"><h2 class="font-black text-lg text-orange-600">정산 데이터 입력</h2><button onclick="closeInputs()" class="text-slate-300">✕</button></div>
            <input type="date" id="sDate" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm">
            <div class="grid grid-cols-2 gap-3">
                <div><p class="text-[9px] font-black text-slate-400 mb-1 ml-2">총 판매수량</p><input type="number" id="sQty" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-center"></div>
                <div><p class="text-[9px] font-black text-orange-600 mb-1 ml-2">최종 정산금</p><input type="number" id="sTotal" class="w-full p-4 bg-orange-50 rounded-2xl font-black text-orange-600 text-center"></div>
            </div>
            <button onclick="saveData('settle')" class="w-full bg-orange-500 text-white p-5 rounded-2xl font-black mt-2 transition-all active:bg-orange-600">입력 완료</button>
        </section>
    </div>
</body>
</html>

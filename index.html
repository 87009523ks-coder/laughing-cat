<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 × 세발자전거</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.app",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allRecords = {};
        let productOrder = [];
        let mainChart = null;

        const colorPalette = [
            { main: '#FFD93D', bg: 'rgba(255, 217, 61, 0.1)' },
            { main: '#FF8B13', bg: 'rgba(255, 139, 19, 0.1)' },
            { main: '#FF6B6B', bg: 'rgba(255, 107, 107, 0.1)' },
            { main: '#4D96FF', bg: 'rgba(77, 150, 255, 0.1)' },
            { main: '#6BCB77', bg: 'rgba(107, 203, 119, 0.1)' },
            { main: '#9D72FF', bg: 'rgba(157, 114, 255, 0.1)' }
        ];
        const productTheme = {};

        function init() {
            const now = new Date();
            document.getElementById('headerDate').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
            const monthFilter = document.getElementById('monthFilter');
            monthFilter.value = now.toISOString().substring(0, 7);
            monthFilter.addEventListener('change', processData);

            onValue(ref(db, 'records'), (snapshot) => {
                allRecords = snapshot.val() || {};
                processData();
            });
            onValue(ref(db, 'settings/order'), (snapshot) => {
                productOrder = snapshot.val() || ["고양이 인형", "고양이 키링", "북커버", "양면 파우치", "꽃수세미", "크로스백"];
                productOrder.forEach((name, i) => { 
                    productTheme[name] = colorPalette[i % colorPalette.length]; 
                });
                processData();
            });
        }

        function processData() {
            const summary = {}; let mSettle = 0; let mSales = 0; let tSettle = 0; let tSales = 0;
            const filterMonth = document.getElementById('monthFilter').value;
            const monthlyChartData = {};

            document.getElementById('monthlyTitle').innerText = `${filterMonth.substring(2,4)}년 ${parseInt(filterMonth.substring(5))}월`;

            Object.entries(allRecords).forEach(([id, rec]) => {
                let prod = rec.product || "미분류";
                if (prod === "결제") {
                    tSettle += Number(rec.settleAmount || 0);
                    if (rec.date?.startsWith(filterMonth)) mSettle += Number(rec.settleAmount || 0);
                    return;
                }
                if (!summary[prod]) summary[prod] = { supply: 0, sales: 0, allDetails: [] };
                summary[prod].supply += Number(rec.supplyCount || 0);
                summary[prod].sales += Number(rec.salesCount || 0);
                tSales += Number(rec.salesCount || 0);
                if (rec.date?.startsWith(filterMonth)) {
                    mSales += Number(rec.salesCount || 0);
                    if (Number(rec.salesCount) > 0) monthlyChartData[prod] = (monthlyChartData[prod] || 0) + Number(rec.salesCount);
                }
            });

            document.getElementById('mAmount').innerText = mSettle.toLocaleString() + '원';
            document.getElementById('mCount').innerText = mSales + '개';
            document.getElementById('tAmount').innerText = tSettle.toLocaleString() + '원';
            document.getElementById('tCount').innerText = tSales + '개';
            
            renderCards(summary);
            updateChart(monthlyChartData);
        }

        function renderCards(summary) {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            
            productOrder.forEach(name => {
                const data = summary[name] || { supply: 0, sales: 0 };
                const theme = productTheme[name] || { main: '#ccc', bg: 'rgba(200,200,200,0.1)' };
                
                const card = document.createElement('div');
                card.style.backgroundColor = theme.bg;
                card.className = "backdrop-blur-sm rounded-[1.8rem] p-5 shadow-sm border border-white/40 mb-3 transition-all flex justify-between items-center";
                
                card.innerHTML = `
                    <div class="flex items-center gap-3 w-1/3">
                        <div class="w-3 h-3 rounded-full shrink-0" style="background-color: ${theme.main}"></div>
                        <span class="font-black text-slate-800 text-[15px] tracking-tight truncate">${name}</span>
                    </div>
                    <!-- 수치 영역을 왼쪽으로 더 당김, 숫자 15% 확대 -->
                    <div class="flex flex-1 justify-start ml-4 gap-5 text-sm font-black">
                        <div class="text-center"><p class="text-[9px] text-slate-400 mb-0.5 font-bold">납품</p><p class="text-blue-500 text-[18px]">${data.supply}</p></div>
                        <div class="text-center"><p class="text-[9px] text-slate-400 mb-0.5 font-bold">판매</p><p class="text-red-500 text-[18px]">${data.sales}</p></div>
                        <div class="text-center"><p class="text-[9px] text-slate-400 mb-0.5 font-bold">재고</p><p class="text-slate-900 text-[18px]">${data.supply - data.sales}</p></div>
                    </div>
                    <div class="handle text-slate-300 text-2xl pl-2">≡</div>
                `;
                container.appendChild(card);
            });
        }

        function updateChart(chartData) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            if (mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(chartData), datasets: [{ data: Object.values(chartData), backgroundColor: Object.keys(chartData).map(l => productTheme[l]?.main || '#eee'), borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '82%', responsive: true, maintainAspectRatio: false }
            });
        }
        window.onload = init;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 p-4 pb-48 overflow-x-hidden">
    <div class="max-w-md mx-auto space-y-6">
        <!-- 상단 헤더 재설계 -->
        <header class="py-2 px-1 space-y-4">
            <!-- 타이틀 중앙 정렬 및 15% 확대 -->
            <h1 class="text-[26px] font-black tracking-tighter text-center">웃는 고양이 <span class="text-orange-500">×</span> 세발자전거</h1>
            
            <!-- 날짜(좌) 및 캘린더(우) 배치, 높이 통일 -->
            <div class="flex justify-between items-center">
                <p id="headerDate" class="text-[12.5px] font-black text-slate-600 tracking-wider flex items-center h-[42px]"></p>
                <input type="month" id="monthFilter" class="bg-white border-none rounded-xl px-4 h-[42px] text-[12.5px] font-black shadow-md outline-none text-slate-700">
            </div>
        </header>

        <!-- 대시보드 -->
        <section class="bg-gradient-to-br from-orange-400 to-amber-500 rounded-[2.5rem] p-8 shadow-xl text-white relative overflow-hidden flex flex-col justify-between h-60">
            <div class="relative z-10">
                <!-- 날짜 텍스트 15% 확대 -->
                <p id="monthlyTitle" class="text-[11.5px] font-black opacity-80 uppercase tracking-widest mb-1"></p>
                <p id="mAmount" class="text-4xl font-black tracking-tight">0원</p>
                
                <!-- 총 판매액 10% 확대 -->
                <p class="text-[11px] font-black text-black opacity-70 uppercase tracking-widest mt-6 mb-0.5">총 판매액</p>
                <p id="tAmount" class="text-[28px] font-black text-black leading-tight">0원</p>
            </div>
            
            <div class="absolute -right-4 top-1/2 -translate-y-1/2 w-44 h-44 opacity-40 z-0"><canvas id="salesChart"></canvas></div>
            
            <!-- 하단 텍스트 10% 확대 및 개수 색상 변경 -->
            <div class="relative z-10 flex gap-6 text-[13px] font-bold text-slate-800 border-t border-white/20 pt-4">
                <p>월 판매 <span id="mCount" class="font-black text-slate-800">0개</span></p>
                <p>총 판매 <span id="tCount" class="font-black text-slate-800">0개</span></p>
            </div>
        </section>

        <div id="cardContainer" class="space-y-3"></div>

        <!-- 하단 고정 버튼 -->
        <div class="fixed bottom-8 left-6 right-6 max-w-md mx-auto grid grid-cols-2 gap-4 z-[100]">
            <button class="bg-slate-900 text-white py-5 rounded-[2.2rem] font-black shadow-2xl text-base active:scale-95 transition-all">📦 수량 기록</button>
            <button class="bg-orange-500 text-white py-5 rounded-[2.2rem] font-black shadow-2xl text-base active:scale-95 transition-all">💰 정산 기록</button>
        </div>
    </div>
</body>
</html>

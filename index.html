<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 통합 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.com",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            measurementId: "G-TRXM2NZ5FF",
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 초기화 및 날짜 표시
        function init() {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const dateStr = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일(${days[now.getDay()]})`;
            document.getElementById('headerDate').innerText = dateStr;
            document.querySelectorAll('input[type="date"]').forEach(el => el.valueAsDate = now);
        }

        // 실시간 데이터 합산 로직
        onValue(ref(db, 'records'), (snapshot) => {
            const records = snapshot.val() || {};
            const summary = {};
            Object.values(records).forEach(rec => {
                if (!summary[rec.product]) summary[rec.product] = { supply: 0, sales: 0 };
                summary[rec.product].supply += Number(rec.supplyCount || 0);
                summary[rec.product].sales += Number(rec.salesCount || 0);
            });
            renderTable(summary);
        });

        function renderTable(summary) {
            const body = document.getElementById('inventoryBody');
            body.innerHTML = '';
            const defaults = ["인형", "인형 걸이", "키링", "북커버", "파우치"];
            const products = Array.from(new Set([...defaults, ...Object.keys(summary)]));

            products.forEach(name => {
                const { supply, sales } = summary[name] || { supply: 0, sales: 0 };
                const stock = supply - sales;
                const tr = document.createElement('tr');
                tr.className = "border-b text-sm";
                tr.innerHTML = `
                    <td class="p-3">${name}</td>
                    <td class="p-3 text-center text-blue-500">${supply}</td>
                    <td class="p-3 text-center text-red-500">${sales}</td>
                    <td class="p-3 text-center font-bold">${stock}</td>
                `;
                body.appendChild(tr);
            });
        }

        // 정산 자동 계산 로직
        window.calcSettle = (base) => {
            const price = Number(document.getElementById('sPrice').value) || 0;
            const rate = Number(document.getElementById('sRate').value) || 0;
            const total = Number(document.getElementById('sTotal').value) || 0;
            if (base === 'rate' && price) document.getElementById('sTotal').value = Math.round(price * (rate / 100));
            else if (base === 'total' && price) document.getElementById('sRate').value = ((total / price) * 100).toFixed(1);
        };

        // 데이터 저장 통합 함수
        window.saveData = (type) => {
            let product, supply = 0, sales = 0, price = 0, settle = 0, date;

            if (type === 'basic') {
                date = document.getElementById('bDate').value;
                product = document.getElementById('bProd').value === '기타' ? document.getElementById('bEtc').value : document.getElementById('bProd').value;
                supply = Number(document.getElementById('bSupply').value) || 0;
                sales = Number(document.getElementById('bSales').value) || 0;
            } else {
                date = document.getElementById('sDate').value;
                product = document.getElementById('sProd').value === '기타' ? document.getElementById('sEtc').value : document.getElementById('sProd').value;
                price = Number(document.getElementById('sPrice').value) || 0;
                settle = Number(document.getElementById('sTotal').value) || 0;
                sales = Number(document.getElementById('sQty').value) || 0;
            }

            if (!product) return alert("제품명을 확인하세요.");
            
            push(ref(db, 'records'), {
                date, product, supplyCount: supply, salesCount: sales, 
                price, settleAmount: settle, timestamp: serverTimestamp()
            }).then(() => {
                alert("저장되었습니다.");
                location.reload();
            });
        };

        window.toggleEtc = (selectId, etcId) => {
            const val = document.getElementById(selectId).value;
            document.getElementById(etcId).classList.toggle('hidden', val !== '기타');
        };

        window.onload = init;
    </script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto space-y-4">
        <!-- 상단 날짜 및 헤더 -->
        <header class="flex justify-between items-center bg-white p-5 rounded-3xl shadow-sm">
            <h1 class="text-xl font-black text-orange-500">🐱 웃는 고양이</h1>
            <span id="headerDate" class="text-sm font-bold text-gray-500"></span>
        </header>

        <!-- 재고 현황판 -->
        <section class="bg-white rounded-3xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-[10px] text-gray-400 uppercase tracking-widest">
                    <tr>
                        <th class="p-3">제품명</th>
                        <th class="p-3 text-center">납품</th>
                        <th class="p-3 text-center">판매</th>
                        <th class="p-3 text-center text-orange-500">재고</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </section>

        <!-- [입력] 버튼 섹션 (토글 방식) -->
        <div class="grid grid-cols-2 gap-2">
            <button onclick="document.getElementById('basicInput').classList.toggle('hidden'); document.getElementById('settleInput').classList.add('hidden')" class="bg-gray-800 text-white p-4 rounded-2xl font-bold text-sm shadow-lg">📦 수량 입력</button>
            <button onclick="document.getElementById('settleInput').classList.toggle('hidden'); document.getElementById('basicInput').classList.add('hidden')" class="bg-orange-500 text-white p-4 rounded-2xl font-bold text-sm shadow-lg">💰 정산 입력</button>
        </div>

        <!-- 1. 일반 수량 입력 폼 -->
        <section id="basicInput" class="hidden bg-white p-6 rounded-3xl shadow-xl space-y-3 border-2 border-gray-800">
            <h3 class="font-bold text-gray-800">📦 납품/판매 수량 기록</h3>
            <input type="date" id="bDate" class="w-full p-3 bg-gray-50 rounded-xl border-none">
            <select id="bProd" onchange="toggleEtc('bProd', 'bEtc')" class="w-full p-3 bg-gray-50 rounded-xl border-none">
                <option value="인형">인형</option><option value="인형 걸이">인형 걸이</option><option value="키링">키링</option>
                <option value="북커버">북커버</option><option value="파우치">파우치</option><option value="기타">기타 직접입력</option>
            </select>
            <input type="text" id="bEtc" placeholder="제품명 입력" class="hidden w-full p-3 bg-orange-50 rounded-xl border-none ring-1 ring-orange-200">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="bSupply" placeholder="납품수량" class="p-3 bg-gray-50 rounded-xl border-none text-blue-600 font-bold">
                <input type="number" id="bSales" placeholder="판매수량" class="p-3 bg-gray-50 rounded-xl border-none text-red-600 font-bold">
            </div>
            <button onclick="saveData('basic')" class="w-full bg-gray-800 text-white p-4 rounded-xl font-bold">저장하기</button>
        </section>

        <!-- 2. 정산 입력 폼 -->
        <section id="settleInput" class="hidden bg-white p-6 rounded-3xl shadow-xl space-y-3 border-2 border-orange-500">
            <h3 class="font-bold text-orange-600">💰 정산 금액 기록</h3>
            <input type="date" id="sDate" class="w-full p-3 bg-gray-50 rounded-xl border-none">
            <select id="sProd" onchange="toggleEtc('sProd', 'sEtc')" class="w-full p-3 bg-gray-50 rounded-xl border-none">
                <option value="인형">인형</option><option value="인형 걸이">인형 걸이</option><option value="키링">키링</option>
                <option value="북커버">북커버</option><option value="파우치">파우치</option><option value="기타">기타 직접입력</option>
            </select>
            <input type="text" id="sEtc" placeholder="제품명 입력" class="hidden w-full p-3 bg-orange-50 rounded-xl border-none ring-1 ring-orange-200">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="sPrice" oninput="calcSettle('rate')" placeholder="단가" class="p-3 bg-gray-50 rounded-xl border-none">
                <input type="number" id="sQty" placeholder="판매갯수" class="p-3 bg-gray-50 rounded-xl border-none font-bold text-orange-500">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="sRate" oninput="calcSettle('rate')" placeholder="정산 %" class="p-3 bg-blue-50 rounded-xl border-none text-blue-600 font-bold">
                <input type="number" id="sTotal" oninput="calcSettle('total')" placeholder="정산금액" class="p-3 bg-green-50 rounded-xl border-none text-green-600 font-bold">
            </div>
            <button onclick="saveData('settle')" class="w-full bg-orange-500 text-white p-4 rounded-xl font-bold">정산 저장</button>
        </section>
    </div>
</body>
</html>

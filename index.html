<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웃는 고양이 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK 로드 (리얼타임 데이터베이스용으로 변경) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 1. Zorba님의 파이어베이스 설정 (주소 추가됨)
        const firebaseConfig = {
            apiKey: "AIzaSyAEBAXYTnTUUaBmEGJa1YLEQXP9g4kfRJ0",
            authDomain: "laughingcat-e0108.firebaseapp.com",
            projectId: "laughingcat-e0108",
            storageBucket: "laughingcat-e0108.firebasestorage.app",
            messagingSenderId: "272394722362",
            appId: "1:272394722362:web:aa873bc9aa344c4ba4a903",
            measurementId: "G-TRXM2NZ5FF",
            // 📍 찾으셨던 그 주소를 여기에 넣었습니다!
            databaseURL: "https://laughingcat-e0108-default-rtdb.firebaseio.com"
        };

        // 2. 파이어베이스 초기화
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const inventoryRef = ref(db, 'inventory');

        // 초기 재고 설정
        const initialProducts = {
            "고양이 인형 대": { price: 16000, stock: 5 },
            "고양이 인형 걸이": { price: 16000, stock: 0 },
            "고양이 키링": { price: 14400, stock: 7 },
            "북커버": { price: 20000, stock: 6 },
            "양면 파우치": { price: 12000, stock: 4 }
        };

        // 실시간 데이터 감시 (Realtime Database 방식)
        onValue(inventoryRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                // 데이터가 전혀 없으면 초기화
                set(inventoryRef, initialProducts);
            } else {
                render(data);
            }
        });

        // 화면 그리기 함수
        function render(data) {
            const list = document.getElementById('stockList');
            list.innerHTML = '';
            
            for (const [name, info] of Object.entries(data)) {
                const itemDiv = document.createElement('div');
                itemDiv.className = "flex justify-between items-center p-3 bg-gray-50 rounded-lg shadow-sm";
                itemDiv.innerHTML = `
                    <div>
                        <span class="font-medium">${name}</span>
                        <p class="text-xs text-gray-400">공급가: ${info.price.toLocaleString()}원</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-lg font-bold text-orange-600">${info.stock}개</span>
                        <button onclick="updateStock('${name}', -1)" class="text-xs bg-red-100 text-red-600 px-3 py-2 rounded-lg font-bold">정산</button>
                    </div>
                `;
                list.appendChild(itemDiv);
            }
        }

        // 재고 수정 함수
        window.updateStock = (name, change) => {
            // 현재 화면의 값을 가져와서 계산
            const stockElement = document.querySelector(`span[onclick*="${name}"]`) || {innerText: '0'}; 
            // 실시간 DB 업데이트를 위해 해당 경로 지정
            const itemRef = ref(db, `inventory/${name}`);
            
            // 기존 데이터의 수량을 가져오기 위해 스냅샷 확인 후 업데이트
            onValue(itemRef, (snapshot) => {
                const currentInfo = snapshot.val();
                if (currentInfo) {
                    const newStock = (currentInfo.stock || 0) + change;
                    update(ref(db, `inventory/${name}`), { stock: newStock });
                }
            }, { onlyOnce: true });
        };

        // 납품 등록 함수
        window.addStock = () => {
            const name = document.getElementById('productSelect').value;
            const qty = parseInt(document.getElementById('quantityInput').value);
            if (isNaN(qty) || qty <= 0) return alert("수량을 입력하세요.");
            
            window.updateStock(name, qty);
            document.getElementById('quantityInput').value = '';
        };
    </script>
</head>
<body class="bg-gray-100 text-gray-900 p-4">
    <div class="max-w-md mx-auto">
        <header class="text-center my-6">
            <h1 class="text-2xl font-black text-orange-500">🐱 웃는 고양이 관리</h1>
            <p class="text-sm text-gray-500 font-medium">리얼타임 데이터베이스 연동됨</p>
        </header>

        <section class="bg-white p-6 rounded-3xl shadow-md mb-6">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🚚 납품 기록</h2>
            <select id="productSelect" class="w-full p-4 border-none bg-gray-50 rounded-2xl mb-3 focus:ring-2 focus:ring-orange-500">
                <option value="고양이 인형 대">고양이 인형 대</option>
                <option value="고양이 인형 걸이">고양이 인형 걸이</option>
                <option value="고양이 키링">고양이 키링</option>
                <option value="북커버">북커버</option>
                <option value="양면 파우치">양면 파우치</option>
            </select>
            <div class="flex gap-2">
                <input type="number" id="quantityInput" placeholder="수량 입력" class="flex-1 p-4 border-none bg-gray-50 rounded-2xl focus:ring-2 focus:ring-orange-500">
                <button onclick="addStock()" class="bg-orange-500 text-white px-6 rounded-2xl font-bold shadow-lg shadow-orange-200">등록</button>
            </div>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-md">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">📊 현재 재고</h2>
            <div id="stockList" class="space-y-3">
                <p class="text-center text-gray-400 py-10">데이터를 불러오는 중...</p>
            </div>
        </section>
    </div>
</body>
</html>
